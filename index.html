<!DOCTYPE html>
<html manifest="clock.appcache">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Clock">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#050505">
  <title>Retro Clock</title>
  <!--
    Home screen icon. Without these links iOS screenshots the page and uses that
    as the icon, which comes out differently on every model. Each iPad picks the
    size closest to its own: 76 on the non retina mini, 152 on a retina iPad,
    167 on an iPad Pro. The files are drawn by tools/make-icons.js.
  -->
  <link rel="apple-touch-icon" sizes="76x76" href="icons/icon-76.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" sizes="512x512" href="icons/icon-512.png">
  <style>
    /*
      Retro Clock
      -----------
      Targets every iPad from the original iPad mini (Safari on iOS 9.3.5) up to
      current models, plus desktop browsers.

      Constraints that follow from iOS 9 Safari:
      - no Service Worker (Application Cache is used there; sw.js covers modern iOS),
      - no CSS custom properties, no calc() tricks, no flexbox gap,
      - ES5 only: no let/const, no arrow functions, no template strings.

      Sizing rule: this stylesheet never hardcodes a device size. Everything that
      depends on the screen is generated at runtime into #metrics by applyMetrics(),
      which fits the clock into the current viewport. Inside one digit the geometry
      is expressed in percentages, so a digit scales as a whole.
    */

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      color: #ffb648;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      -webkit-text-size-adjust: none;
      /*
        The clock uses its own long press to toggle seconds. Once the page is
        clickable (see cursor: pointer below) iOS treats that same long press as a
        text selection and raises the grey Copy / Look Up callout over it. Turning
        the callout off keeps the long press to ourselves.
      */
      -webkit-touch-callout: none;
    }

    /* display: table centering is the most reliable full-height centering on iOS 9. */
    body {
      display: table;
      text-align: center;
      -webkit-font-smoothing: antialiased;
      /*
        A short tap anywhere cycles the colour, which is a click handler on the
        document. Safari on iOS 9 only synthesises a click on an element it
        considers clickable - a link, a button, or anything with cursor: pointer -
        so without this the tap reached the clock and did nothing, and only the
        long press (built on touch events) worked. The settings button and the
        option buttons already carried cursor: pointer, which is why they alone
        responded. Making the whole page clickable fixes the tap on the old iPad
        and only shows a pointer cursor on the desktop, where the clock is indeed
        click to recolour.
      */
      cursor: pointer;
    }

    .stage {
      display: table-cell;
      vertical-align: middle;
    }

    #clock {
      display: inline-block;
    }

    /*
      .frame is the physical device around the digits: the LED panel, the nixie
      board, the VFD glass or the LCD module. Flat mode removes it.
    */
    .frame {
      position: relative;
      display: inline-block;
    }

    /* font-size and line-height are zeroed so inline-block cells add no stray gaps. */
    #time {
      position: relative;
      white-space: nowrap;
      font-size: 0;
      line-height: 0;
    }

    /* One digit or the colon. Height comes from #metrics, inner parts use %. */
    .cell {
      position: relative;
      display: inline-block;
      vertical-align: middle;
    }

    .layer {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
    }

    /* ---------- seven segment layer ---------- */

    /*
      Segment names: a top, b upper right, c lower right, d bottom,
      e lower left, f upper left, g middle.

      Each segment is three things:
      - .seg    the box that defines where the segment sits,
      - i       the visible body, clipped into a bevelled bar the way a real
                LED/LCD/VFD segment is shaped,
      - :before the glow source.

      The glow cannot live on the body, because clip-path cuts a shadow away, and
      it cannot live on .seg either, because an outer box-shadow is never painted
      inside its own box, which would leave the bevelled corners dark. So it comes
      from a pill shaped pseudo element sitting *inside* the body: the light then
      spills out through the whole segment, corners included.

      The pill hugs the edge of the body as closely as the bevel allows. Sink it
      any deeper and the brightest inner ring of the halo ends up hidden under
      the opaque body, which makes the digits look flat next to the colon dots -
      their halo starts right at their own edge.
    */
    .seg {
      position: absolute;
    }

    .seg i {
      display: block;
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.04);
    }

    .seg:before {
      content: "";
      position: absolute;
      border-radius: 999px;
    }

    /* The pill stays near full thickness; the bevel narrows the bar only past the shoulder. */
    .seg-h:before {
      left: 9%;
      right: 9%;
      top: 6%;
      bottom: 6%;
    }

    .seg-v:before {
      left: 6%;
      right: 6%;
      top: 5%;
      bottom: 5%;
    }

    /*
      The bevel runs from the shoulder to the tip. The tip itself sits on the edge
      of the box, so lengthening the bevel pulls the shoulders inwards and sharpens
      the point without moving the tip: neighbouring segments keep the same gap
      where they meet at a corner. These lengths are what makes the point acute -
      the taper has to be longer than the bar is thick, or the end reads as a blunt
      cut. A horizontal bar is thin and wide, so its taper is a larger share of the
      length than a vertical one needs.
    */
    .seg-h i {
      -webkit-clip-path: polygon(13% 0, 87% 0, 100% 50%, 87% 100%, 13% 100%, 0 50%);
      clip-path: polygon(13% 0, 87% 0, 100% 50%, 87% 100%, 13% 100%, 0 50%);
    }

    .seg-v i {
      -webkit-clip-path: polygon(0 9%, 50% 0, 100% 9%, 100% 91%, 50% 100%, 0 91%);
      clip-path: polygon(0 9%, 50% 0, 100% 9%, 100% 91%, 50% 100%, 0 91%);
    }

    /* Thin geometry (default). */
    .seg-a,
    .seg-d,
    .seg-g {
      left: 15%;
      width: 70%;
      height: 8%;
    }

    .seg-a {
      top: 3%;
    }

    .seg-g {
      top: 46%;
    }

    .seg-d {
      bottom: 3%;
    }

    .seg-b,
    .seg-c,
    .seg-e,
    .seg-f {
      width: 13%;
      height: 33.5%;
    }

    .seg-b,
    .seg-c {
      right: 5.5%;
    }

    .seg-e,
    .seg-f {
      left: 5.5%;
    }

    .seg-f,
    .seg-b {
      top: 11.5%;
    }

    .seg-e,
    .seg-c {
      bottom: 11.5%;
    }

    /* Bold geometry. */
    body.weight-bold .seg-a,
    body.weight-bold .seg-d,
    body.weight-bold .seg-g {
      height: 10%;
    }

    body.weight-bold .seg-a {
      top: 3.5%;
    }

    body.weight-bold .seg-g {
      top: 45.5%;
    }

    body.weight-bold .seg-d {
      bottom: 3.5%;
    }

    body.weight-bold .seg-b,
    body.weight-bold .seg-c,
    body.weight-bold .seg-e,
    body.weight-bold .seg-f {
      width: 15.5%;
      height: 32%;
    }

    body.weight-bold .seg-f,
    body.weight-bold .seg-b {
      top: 13%;
    }

    body.weight-bold .seg-e,
    body.weight-bold .seg-c {
      bottom: 13%;
    }

    /* ---------- numeral layer (nixie tubes) ---------- */

    /*
      A nixie tube holds ten stacked cathodes shaped like digits. Only one glows;
      the others stay visible as dark wire ghosts, each one a little further back.
      That ghosting is what makes a nixie look like a nixie, so the unlit numerals
      are always rendered, just very dim.
    */
    .numerals {
      display: none;
    }

    /*
      The cathodes are bent wire, not solid shapes, so an unlit digit is drawn as
      a thin outline (text-stroke) with almost no fill.
    */
    .num {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      text-align: center;
      font-family: "HelveticaNeue-Light", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: normal;
      color: rgba(255, 150, 90, 0.04);
      -webkit-text-stroke: 0.022em rgba(255, 180, 130, 0.09);
    }

    /* Depth of the cathode stack: later digits sit slightly further from the glass. */
    .num-1 { -webkit-transform: scale(0.994); transform: scale(0.994); }
    .num-2 { -webkit-transform: scale(0.988); transform: scale(0.988); }
    .num-3 { -webkit-transform: scale(0.982); transform: scale(0.982); }
    .num-4 { -webkit-transform: scale(0.976); transform: scale(0.976); }
    .num-5 { -webkit-transform: scale(0.970); transform: scale(0.970); }
    .num-6 { -webkit-transform: scale(0.964); transform: scale(0.964); }
    .num-7 { -webkit-transform: scale(0.958); transform: scale(0.958); }
    .num-8 { -webkit-transform: scale(0.952); transform: scale(0.952); }
    .num-9 { -webkit-transform: scale(0.946); transform: scale(0.946); }

    /* Tube envelope, anode mesh and glass highlight. */
    .glass {
      display: none;
    }

    /* ---------- colon ---------- */

    .colon .dot {
      position: absolute;
      left: 50%;
      border-radius: 50%;
      background: currentColor;
    }

    .colon .dot-top {
      top: 30%;
    }

    .colon .dot-bottom {
      bottom: 30%;
    }

    .colon.blink .dot {
      opacity: 0.18;
      box-shadow: none;
    }

    /* ---------- seconds, date, meridiem ---------- */

    /*
      The annunciator column to the right of the minutes: AM/PM at the top,
      seconds at the bottom, the way a desk clock arranges them.

      Both live in the DOM at all times and are hidden when switched off, so the
      layout maths never has to rebuild them. The column is a real box in the
      row, not an absolutely positioned overlay - an overlay takes up no space,
      so it would collide with the digits again the moment they grow.
    */
    .side {
      display: none;
      position: relative;
      vertical-align: middle;
    }

    body.show-seconds .side,
    body.hour12 .side {
      display: inline-block;
    }

    .seconds {
      display: none;
      position: absolute;
      left: 0;
      bottom: 0;
      white-space: nowrap;
    }

    body.show-seconds .seconds {
      display: block;
    }

    #date-line {
      display: none;
      font-weight: bold;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: currentColor;
    }

    body.show-date #date-line {
      display: block;
    }

    #meridiem {
      display: none;
      position: absolute;
      left: 0;
      top: 0;
      letter-spacing: 0.12em;
      font-weight: bold;
      color: currentColor;
    }

    body.hour12 #meridiem {
      display: block;
    }

    /* ---------- LED mode ---------- */

    /*
      Classic seven segment LED module: a dark plastic panel, almost invisible
      unlit segments and a strong, layered halo around the lit ones. The halo is
      built from several box-shadow rings, which is the cheapest convincing bloom
      on an old GPU (no filter: blur, which is slow on iOS 9).
    */
    body.mode-led .frame {
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.05), transparent 45%),
        linear-gradient(180deg, #161616, #090909 55%, #040404);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        inset 0 -2px 20px rgba(0, 0, 0, 0.7),
        0 18px 60px rgba(0, 0, 0, 0.5);
    }

    body.mode-led .seg i {
      background: rgba(255, 255, 255, 0.035);
    }

    /* The lit body is the theme colour with a brighter top edge, like lit plastic. */
    body.mode-led .seg.on i {
      background-color: currentColor;
      background-image: -webkit-linear-gradient(top, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.05) 60%, rgba(255, 255, 255, 0));
      background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0.05) 60%, rgba(255, 255, 255, 0));
    }

    /* ---------- VFD mode ---------- */

    /*
      Vacuum fluorescent display: phosphor segments behind a smoked glass tube.
      Two details sell it: the unlit segments stay clearly visible as faintly
      glowing bars, and thin horizontal filament wires cross the whole display.

      The phosphor is blue-green, but coloured filters over the tube were normal
      in radios, calculators and car dashboards, so the tube follows the chosen
      colour and Ice gives the classic untinted look. A lit VFD segment reads as
      an almost white core inside a coloured halo, which is why the body carries
      a heavy white wash on top of the theme colour - unlike an LED, which keeps
      its colour right to the middle.
    */
    body.mode-vfd .frame {
      background:
        radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.035), transparent 60%),
        linear-gradient(180deg, #0d1113, #05080a 60%, #020405);
      box-shadow:
        inset 0 0 60px rgba(255, 255, 255, 0.035),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 18px 60px rgba(0, 0, 0, 0.55);
    }

    /* Unlit phosphor is never black: it stays visible in the colour of the tube. */
    body.mode-vfd .seg i {
      background: currentColor;
      opacity: 0.13;
    }

    body.mode-vfd .seg.on i {
      opacity: 1;
      background-color: currentColor;
      background-image: -webkit-linear-gradient(top, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.42));
      background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.42));
    }

    body.mode-vfd .colon .dot {
      background-color: currentColor;
      background-image: -webkit-linear-gradient(top, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.42));
      background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.42));
    }

    /*
      The frame is not clipped: with the panel this tight around the digits,
      overflow: hidden would cut the halo off at the panel edge. So the overlays
      that used to rely on that clipping round their own corners instead.
    */
    .filaments {
      display: none;
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      border-radius: inherit;
      pointer-events: none;
      opacity: 0.5;
    }

    body.mode-vfd .filaments {
      display: block;
    }

    /* ---------- LCD mode ---------- */

    /*
      Backlit LCD, the kind used in alarm clocks and calculators: the panel itself
      is the light source, the digits are dark, and every unlit segment stays
      faintly readable. No glow at all - and a short transition, because real
      LCD segments do not switch instantly.
    */
    body.mode-lcd .frame {
      box-shadow:
        inset 0 0 0 1px rgba(0, 0, 0, 0.25),
        inset 0 2px 18px rgba(0, 0, 0, 0.28),
        0 16px 50px rgba(0, 0, 0, 0.55);
    }

    body.mode-lcd .seg i {
      background: rgba(18, 22, 16, 0.09);
      -webkit-transition: background 0.13s linear;
      transition: background 0.13s linear;
    }

    body.mode-lcd .seg.on i {
      background: rgba(15, 19, 14, 0.9);
    }

    body.mode-lcd .colon .dot {
      background: rgba(15, 19, 14, 0.9);
    }

    body.mode-lcd .colon.blink .dot {
      opacity: 0.09;
    }

    body.mode-lcd #date-line,
    body.mode-lcd #meridiem {
      color: rgba(15, 19, 14, 0.86);
      text-shadow: none;
    }

    /* Viewing angle darkening at the panel edges plus a flat sheen on the glass. */
    .lcd-glass {
      display: none;
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      border-radius: inherit;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.16), transparent 55%),
        linear-gradient(160deg, rgba(255, 255, 255, 0.12), transparent 35%, rgba(0, 0, 0, 0.12));
    }

    body.mode-lcd .lcd-glass {
      display: block;
    }

    /* ---------- Nixie mode ---------- */

    body.mode-nixie .frame {
      background:
        radial-gradient(circle at 50% 85%, rgba(255, 120, 30, 0.07), transparent 60%),
        linear-gradient(180deg, #191411, #0c0908 60%, #060404);
      box-shadow:
        inset 0 1px 0 rgba(255, 190, 120, 0.06),
        inset 0 -30px 60px rgba(255, 90, 0, 0.05),
        0 18px 60px rgba(0, 0, 0, 0.6);
    }

    body.mode-nixie .segments {
      display: none;
    }

    body.mode-nixie .numerals {
      display: block;
    }

    body.mode-nixie .glass {
      display: block;
    }

    /* Tube envelope: rounded glass, dark inside, bright rim where light grazes it. */
    .glass {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      border-radius: 46% 46% 42% 42% / 26% 26% 24% 24%;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.01) 16%, rgba(0, 0, 0, 0) 45%, rgba(0, 0, 0, 0) 62%, rgba(255, 255, 255, 0.02) 86%, rgba(255, 255, 255, 0.08)),
        radial-gradient(circle at 50% 40%, rgba(255, 120, 40, 0.05), rgba(0, 0, 0, 0.35) 75%);
      box-shadow:
        inset 0 0 30px rgba(255, 130, 40, 0.05),
        inset 0 14px 26px rgba(0, 0, 0, 0.45),
        inset 0 -10px 20px rgba(0, 0, 0, 0.5);
    }

    /* Anode mesh in front of the cathodes. */
    .glass:before {
      content: "";
      position: absolute;
      left: 8%;
      top: 6%;
      right: 8%;
      bottom: 6%;
      opacity: 0.5;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.05) 0, rgba(255, 255, 255, 0.05) 1px, transparent 1px, transparent 5px),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.05) 0, rgba(255, 255, 255, 0.05) 1px, transparent 1px, transparent 5px);
    }

    /* Specular streak on the glass. */
    .glass:after {
      content: "";
      position: absolute;
      left: 9%;
      top: 8%;
      width: 10%;
      bottom: 30%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.02));
      opacity: 0.55;
    }

    /*
      A lit cathode is a glowing wire surrounded by an orange plasma haze: bright
      outline (text-stroke), soft fill, and several shadow rings for the bloom.
    */
    body.mode-nixie .num.on {
      color: rgba(255, 128, 40, 0.42);
      -webkit-text-stroke: 0.028em #ffb267;
      text-shadow:
        0 0 5px rgba(255, 200, 140, 0.85),
        0 0 14px rgba(255, 145, 55, 0.9),
        0 0 34px rgba(255, 110, 20, 0.6),
        0 0 70px rgba(255, 80, 0, 0.38),
        0 0 120px rgba(255, 60, 0, 0.2);
      -webkit-transform: scale(1);
      transform: scale(1);
      -webkit-animation: nixie-flicker 5s ease-in-out infinite;
      animation: nixie-flicker 5s ease-in-out infinite;
    }

    /* Neon never sits perfectly still. The movement here is deliberately small. */
    @-webkit-keyframes nixie-flicker {
      0%, 100% { opacity: 1; }
      42% { opacity: 1; }
      45% { opacity: 0.92; }
      47% { opacity: 1; }
      78% { opacity: 0.95; }
      80% { opacity: 1; }
    }

    @keyframes nixie-flicker {
      0%, 100% { opacity: 1; }
      42% { opacity: 1; }
      45% { opacity: 0.92; }
      47% { opacity: 1; }
      78% { opacity: 0.95; }
      80% { opacity: 1; }
    }

    /*
      The colon of a nixie clock is not an LED dot - it is a small neon lamp
      (an INS-1 and its kin), where the glow sits on the electrode ring and the
      gas inside it is only a haze. A solid filled disc reads as a light
      emitting diode and gives the whole tube board away.

      The ring is a gradient, not a border. A border has a hard inner edge, and
      against the dark panel the middle of the lamp then looks like a black hole
      punched into it. Ionised gas has no edges: the glow has to fade out of the
      ring in both directions, inwards into the haze and outwards into the bloom.
    */
    body.mode-nixie .colon .dot {
      background:
        radial-gradient(circle at 50% 50%,
          rgba(255, 175, 95, 0.82) 0%,
          rgba(255, 170, 90, 0.86) 38%,
          rgba(255, 205, 150, 1) 66%,
          rgba(255, 165, 80, 0.9) 84%,
          rgba(255, 125, 35, 0.45) 100%);
      box-shadow:
        0 0 5px rgba(255, 200, 140, 0.85),
        0 0 14px rgba(255, 145, 55, 0.9),
        0 0 32px rgba(255, 110, 20, 0.6),
        0 0 66px rgba(255, 80, 0, 0.35);
      -webkit-animation: nixie-flicker 5s ease-in-out infinite;
      animation: nixie-flicker 5s ease-in-out infinite;
    }

    /*
      The date is built like a cathode rather than like text: a glowing wire
      outline, a thin plasma fill inside it and the same bloom as a lit numeral.
      A real IN-14 could only ever show digits, so a word in a tube would be a
      lie either way - this is honest about being neon lettering next to the
      tubes, and it follows the same recipe, so it sits at the digits' brightness
      instead of reading as plain orange text.

      The glyphs go back to a normal weight here: bold strokes plus an outline
      make the wire look like a pipe.
    */
    body.mode-nixie #date-line,
    body.mode-nixie #meridiem {
      font-weight: normal;
      color: rgba(255, 128, 40, 0.42);
      -webkit-text-stroke: 0.03em #ffb267;
      text-shadow:
        0 0 4px rgba(255, 200, 140, 0.85),
        0 0 12px rgba(255, 145, 55, 0.9),
        0 0 28px rgba(255, 110, 20, 0.6),
        0 0 60px rgba(255, 80, 0, 0.35);
      -webkit-animation: nixie-flicker 5s ease-in-out infinite;
      animation: nixie-flicker 5s ease-in-out infinite;
    }

    /* ---------- Flat mode ---------- */

    body.mode-flat .frame {
      background: none;
      box-shadow: none;
    }

    body.mode-flat .seg i {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      -webkit-clip-path: none;
      clip-path: none;
    }

    body.mode-flat .seg.on i {
      background: currentColor;
    }

    body.mode-flat #date-line,
    body.mode-flat #meridiem {
      text-shadow: none;
    }

    /* ---------- colour themes ---------- */

    /*
      A theme sets the body colour, which the segments pick up through
      currentColor, and the glow rings for LED mode. VFD and nixie keep their own
      authentic phosphor/neon colours; for LCD the theme picks the backlight.
    */
    body.theme-amber { background: #050505; color: #ffb648; }
    body.theme-red { background: #050404; color: #ff6b5e; }

      colour itself is dim, by a quarter. The text is therefore stacked the same

      over it, and the halo around it.

    /*

      order, so that it lands at the same brightness: a solid coloured glyph
      (the zero blur shadow), a half transparent white wash over it, and a
      coloured bloom around it. Dimming the parts separately, or leaning on
      opacity, either drains the colour out of the text or pushes it off the
      brightness of the digits it sits under.

    body.mode-flat.theme-red { background: #120d0d; color: #ff7b72; }

      ---------- night ----------

      Night dimming has two halves. The overall level is set inline on #clock by
      applyDim() from the Night brightness slider, so no fixed value appears here.
      What follows is the other half: switching off everything that emulates a
      physical display but emits no information.

      By daylight the panel, the smoked glass, the tube envelope and the LCD
      backlight are what make each mode look like real hardware. In a dark room
      they are just a lit rectangle - and the backlight in particular is the
      brightest thing on the screen by a wide margin, far brighter than the digits

    body.dim.mode-lcd .colon .dot {

          statusWeight: "толщина: ",
          statusSecondsOn: "секунды включены",
          statusSecondsOff: "секунды выключены",
          statusDateOn: "дата включена",
          statusDateOff: "дата выключена",
          statusBlinkOn: "мигание включено",
          statusBlinkOff: "мигание выключено",
          statusDimAuto: "ночной режим авто",
          statusDimOff: "ночной режим выкл"
        }
      };

      var DEFAULTS = {
        mode: "led",
        theme: "amber",
        weight: "thin",
        language: "en",
        hour12: false,
        showSeconds: false,
        showDate: false,
        blink: true,
        autoDim: true,
        nightBrightness: 50,
        /* Filled in once by geolocation; null means the clock falls back to fixed hours. */
        latitude: null,
        longitude: null
      };

      /* ---------------------------------------------------------------
         DOM
         --------------------------------------------------------------- */

      var body = document.body;
      var clockNode = document.getElementById("clock");
      var timeNode = document.getElementById("time");
      var dateNode = document.getElementById("date-line");
      var meridiemNode = document.getElementById("meridiem");
      var metricsNode = document.getElementById("metrics");
      var statusNode = document.getElementById("status");
      var settingsButton = document.getElementById("settings-button");
      var settingsPanel = document.getElementById("settings-panel");
      var dimRange = document.getElementById("dim-range");
      var dimValue = document.getElementById("dim-value");
      var dimHint = document.getElementById("dim-hint");

      var settings = loadSettings();
      var cells = {};          /* role -> { segments: {a..g}, numerals: [10] , value: string } */
      var colonCell = null;
      var i18nNodes = [];
      var statusTimer = null;
      var holdTimer = null;
      var holdTriggered = false;
      var resizeTimer = null;
      var lastDateKey = "";
      var lastDimState = null;
      var lastViewport = "";
      var wakeLock = null;

      /*
        Burn in protection. An LCD that holds the same picture for weeks keeps a
        ghost of it, and a wall clock is the worst case: the same digits, in the
        same place, lit for months. The whole panel therefore drifts across the
        screen. Two things decide whether that actually helps.

        How far it moves. A shift smaller than the thickness of a segment only
        lands a lit pixel on top of another lit pixel and protects nothing, and a
        segment is tens of pixels thick at these digit sizes. The clock needs room
        to travel that far, so applyMetrics() keeps DRIFT_ROOM of the viewport
        free on every side - it costs a few per cent of digit height - and the
        drift then uses all the space the layout left over, which in portrait,
        where the digits are width bound, is a lot more than the reserve.

        Where it goes. A short cycle of fixed spots lights the same pixels again
        and again, and the pixels between the spots stay dark, so the ghost simply
        gains hard edges. Instead the clock rides a Lissajous figure: two sine
        waves whose periods have no common divisor, which never repeats a position
        for days on end, never rests anywhere, and sweeps the whole box evenly.
        The periods are long enough that the clock creeps by a pixel or two per
        step and the eye cannot catch it moving.
      */
      var DRIFT_ROOM = 0.02;             /* share of the viewport reserved on each side */
      var DRIFT_CAP = 0.06;              /* the drift never grows past this share of the viewport */
      var DRIFT_TICK = 20000;            /* how often the position is recomputed */
      var DRIFT_X_PERIOD = 43 * 60000;   /* 43 and 71 minutes: coprime, so the figure */
      var DRIFT_Y_PERIOD = 71 * 60000;   /* only closes after two days */

      var driftX = 0;                    /* px, how far the clock may travel; set by measureDrift */
      var driftY = 0;

      /* ---------------------------------------------------------------
         Settings
         --------------------------------------------------------------- */

      function loadSettings() {
        var raw = null;

        try {
          raw = window.localStorage ? window.localStorage.getItem("clockSettings") : null;
        } catch (error) {
          raw = null;
        }

        if (!raw) {
          return copyDefaults();
        }

        try {
          return normalize(JSON.parse(raw));
        } catch (error) {
          return copyDefaults();
        }
      }

      function copyDefaults() {
        var result = {};
        var key;

        for (key in DEFAULTS) {
          if (DEFAULTS.hasOwnProperty(key)) {
            result[key] = DEFAULTS[key];
          }
        }

        return result;
      }

      /*
        Saved settings can come from any older version of the clock, so anything
        unknown falls back to the default. The pre-refactor build stored
        style: "retro" | "flat" instead of a display mode.
      */
      function normalize(saved) {
        var result = copyDefaults();

        if (saved && typeof saved === "object") {
          if (saved.style === "flat" && !saved.mode) {
            result.mode = "flat";
          }

          if (contains(MODES, saved.mode)) {
            result.mode = saved.mode;
          }

          if (contains(THEMES, saved.theme)) {
            result.theme = saved.theme;
          }

          if (contains(WEIGHTS, saved.weight)) {
            result.weight = saved.weight;
          }

          if (contains(LANGUAGES, saved.language)) {
            result.language = saved.language;
          }

          result.hour12 = saved.hour12 === true;
          result.showSeconds = saved.showSeconds === true;
          result.showDate = saved.showDate === true;
          result.blink = saved.blink !== false;
          result.autoDim = saved.autoDim !== false;

          if (typeof saved.nightBrightness === "number" && isFinite(saved.nightBrightness)) {
            result.nightBrightness = Math.max(10, Math.min(80, Math.round(saved.nightBrightness / 5) * 5));
          }

          /* Coordinates are only ever taken as a pair; half of one is worse than none. */
          if (isCoordinate(saved.latitude, 90) && isCoordinate(saved.longitude, 180)) {
            result.latitude = saved.latitude;
            result.longitude = saved.longitude;
          }
        }

        return result;
      }

      function isCoordinate(value, limit) {
        return typeof value === "number" && isFinite(value) && value >= -limit && value <= limit;
      }

      function saveSettings() {
        try {
          if (window.localStorage) {
            window.localStorage.setItem("clockSettings", JSON.stringify(settings));
          }
        } catch (error) {
          /* Private mode on old Safari throws here. Losing the settings is fine. */
        }
      }

      function contains(list, value) {
        var i;

        for (i = 0; i < list.length; i++) {
          if (list[i] === value) {
            return true;
          }
        }

        return false;
      }

      /* ---------------------------------------------------------------
         Building the display
         --------------------------------------------------------------- */

      /*
        Every cell carries both a segment layer and a numeral layer. Switching the
        display mode then costs nothing at runtime: CSS decides which layer is
        visible, and the paint code keeps both in sync.
      */
      function createDigitCell(role) {
        var cell = document.createElement("div");
        var glass = document.createElement("div");
        var numerals = document.createElement("div");
        var segments = document.createElement("div");
        var record = { node: cell, segments: {}, numerals: [], value: null };
        var i;
        var seg;
        var inner;
        var num;

        cell.className = "cell digit";
        glass.className = "glass";
        numerals.className = "layer numerals";
        segments.className = "layer segments";

        for (i = 0; i < 10; i++) {
          num = document.createElement("span");
          num.className = "num num-" + i;
          num.appendChild(document.createTextNode(String(i)));
          numerals.appendChild(num);
          record.numerals.push(num);
        }

        for (i = 0; i < SEGMENTS.length; i++) {
          seg = document.createElement("span");
          inner = document.createElement("i");
          seg.className = segmentClass(SEGMENTS[i]);
          seg.appendChild(inner);
          segments.appendChild(seg);
          record.segments[SEGMENTS[i]] = seg;
        }

        cell.appendChild(glass);
        cell.appendChild(numerals);
        cell.appendChild(segments);

        cells[role] = record;
        return cell;
      }

      function segmentClass(name) {
        var horizontal = name === "a" || name === "d" || name === "g";
        return "seg seg-" + name + " " + (horizontal ? "seg-h" : "seg-v");
      }

      function createColonCell() {
        var cell = document.createElement("div");
        var top = document.createElement("span");
        var bottom = document.createElement("span");

        cell.className = "cell colon";
        top.className = "dot dot-top";
        bottom.className = "dot dot-bottom";
        cell.appendChild(top);
        cell.appendChild(bottom);

        colonCell = cell;
        return cell;
      }

      function buildDisplay() {
        var seconds = document.createElement("div");
        var side = document.createElement("div");

        timeNode.appendChild(createDigitCell("ht"));
        timeNode.appendChild(createDigitCell("ho"));
        timeNode.appendChild(createColonCell());
        timeNode.appendChild(createDigitCell("mt"));
        timeNode.appendChild(createDigitCell("mo"));

        seconds.className = "seconds";
        seconds.appendChild(createDigitCell("st"));
        seconds.appendChild(createDigitCell("so"));

        /* AM/PM and the seconds share one column to the right of the minutes. */
        side.className = "side";
        side.appendChild(meridiemNode);
        side.appendChild(seconds);
        timeNode.appendChild(side);
      }

      /* ---------------------------------------------------------------
         Layout
         --------------------------------------------------------------- */

      /*
        The one place that knows about the screen. It picks the largest digit
        height at which the whole clock still fits, then writes the resulting
        pixel sizes into the #metrics stylesheet. Called on load, on resize, on
        rotation and whenever a setting changes the shape of the clock.
      */
      function applyMetrics() {
        var box = LAYOUT[settings.mode] || LAYOUT.led;
        var viewportW = window.innerWidth || document.documentElement.clientWidth;
        var viewportH = window.innerHeight || document.documentElement.clientHeight;
        /* The clock is fitted into the screen minus the room the drift needs to move in. */
        var roomX = Math.round(viewportW * DRIFT_ROOM);
        var roomY = Math.round(viewportH * DRIFT_ROOM);
        var availableW = viewportW * 0.99 - 2 * roomX;
        var availableH = viewportH * 0.97 - 2 * roomY;
        var secondsCellW = box.cellW * SECONDS_SCALE;
        var secondsGap = box.gap * SECONDS_SCALE;
        var unitsW = 4 * (box.cellW + 2 * box.gap) + (box.colonW + 2 * box.gap) + 2 * box.padX;
        var unitsH = 1 + 2 * box.padY;
        var sideW = 0;
        var digitH;
        var css;

        lastViewport = viewportW + "x" + viewportH;

        /*
          The annunciator column is as wide as whatever it holds. AM/PM alone is
          narrower than the seconds, and when both are on they stack in the same
          column, so the width is the larger of the two rather than their sum.
        */
        if (settings.showSeconds) {
          sideW = 2 * (secondsCellW + 2 * secondsGap);
        }

        if (settings.hour12) {
          sideW = Math.max(sideW, MERIDIEM_WIDTH);
        }

        if (sideW > 0) {
          unitsW += SECONDS_LEAD + sideW;
        }

        if (settings.showDate) {
          unitsH += DATE_GAP + DATE_SIZE * 1.4;
        }

        digitH = Math.min(availableW / unitsW, availableH / unitsH);
        digitH = Math.max(MIN_DIGIT, Math.min(MAX_DIGIT, Math.floor(digitH)));

        css = [
          ".cell{height:" + px(digitH) + "}",
          ".digit{width:" + px(digitH * box.cellW) + "}",
          ".cell{margin:0 " + px(digitH * box.gap) + "}",
          ".colon{width:" + px(digitH * box.colonW) + "}",
          ".colon .dot{width:" + px(digitH * box.dot) + ";height:" + px(digitH * box.dot) + ";margin-left:" + px(-digitH * box.dot / 2) + "}",
          ".num{font-size:" + px(digitH * 0.82) + ";line-height:" + px(digitH) + "}",
          ".side{width:" + px(digitH * sideW) + ";height:" + px(digitH) + ";margin-left:" + px(digitH * SECONDS_LEAD) + "}",
          ".seconds .cell{height:" + px(digitH * SECONDS_SCALE) + ";margin:0 " + px(digitH * secondsGap) + "}",
          ".seconds .digit{width:" + px(digitH * secondsCellW) + "}",
          ".seconds .num{font-size:" + px(digitH * SECONDS_SCALE * 0.82) + ";line-height:" + px(digitH * SECONDS_SCALE) + "}",
          ".frame{padding:" + px(digitH * box.padY) + " " + px(digitH * box.padX) + ";border-radius:" + px(digitH * box.radius) + "}",
          "#date-line{font-size:" + px(digitH * DATE_SIZE) + ";margin-top:" + px(digitH * DATE_GAP) + "}",
          "#meridiem{font-size:" + px(digitH * MERIDIEM_SIZE) + "}",
          filamentCss(digitH * 0.26)
        ].join("\n");

        setStyleText(metricsNode, css);
        measureDrift(viewportW, viewportH);
      }

      /* Horizontal filament wires of a VFD tube, spaced with the digit height. */
      function filamentCss(spacing) {
        var line = "rgba(255, 255, 255, 0.05)";
        var stops = line + " 0, " + line + " 1px, transparent 1px, transparent " + px(spacing);

        return ".filaments{" +
          "background:-webkit-repeating-linear-gradient(top, " + stops + ");" +
          "background:repeating-linear-gradient(to bottom, " + stops + ");}";
      }

      function px(value) {
        return Math.round(value * 10) / 10 + "px";
      }

      function setStyleText(node, text) {
        if (node.styleSheet) {
          node.styleSheet.cssText = text;
        } else {
          node.innerHTML = "";
          node.appendChild(document.createTextNode(text));
        }
      }

      /* ---------------------------------------------------------------
         Applying settings to the DOM
         --------------------------------------------------------------- */

      function setFlag(name, enabled) {
        if (enabled) {
          if (!hasClass(name)) {
            body.className += (body.className ? " " : "") + name;
          }
        } else {
          body.className = body.className
            .replace(new RegExp("(^|\\s)" + name + "(?=\\s|$)", "g"), " ")
            .replace(/\s+/g, " ")
            .replace(/^\s+|\s+$/g, "");
        }
      }

      function hasClass(name) {
        return new RegExp("(^|\\s)" + name + "(\\s|$)").test(body.className);
      }

      function setGroup(prefix, list, value) {
        var i;

        for (i = 0; i < list.length; i++) {
          setFlag(prefix + list[i], list[i] === value);
        }
      }

      function applyAll() {
        setGroup("mode-", MODES, settings.mode);
        setGroup("theme-", THEMES, settings.theme);
        setFlag("weight-bold", settings.weight === "bold");
        setFlag("show-seconds", settings.showSeconds);
        setFlag("show-date", settings.showDate);
        setFlag("hour12", settings.hour12);
        applyLanguage();
        applyMetrics();
        refreshSettingsUI();

        /* The date and dim state are cached, so force a redraw after any change. */
        lastDateKey = "";
        lastDimState = null;
        resetCells();
        tick();
      }

      function resetCells() {
        var role;

        for (role in cells) {
          if (cells.hasOwnProperty(role)) {
            cells[role].value = null;
          }
        }
      }

      function label(key) {
        return LABELS[settings.language][key] || LABELS.en[key] || key;
      }

      function applyLanguage() {
        var i;

        for (i = 0; i < i18nNodes.length; i++) {
          i18nNodes[i].node.innerHTML = label(i18nNodes[i].key);
        }

        dimRange.setAttribute("aria-label", label("nightBrightness"));
      }

      function collectI18nNodes() {
        var nodes = document.getElementsByTagName("*");
        var i;
        var key;

        for (i = 0; i < nodes.length; i++) {
          key = nodes[i].getAttribute("data-i18n");

          if (key) {
            i18nNodes.push({ node: nodes[i], key: key });
          }
        }
      }

      /* ---------------------------------------------------------------
         Drawing
         --------------------------------------------------------------- */

      function pad(value) {
        return value < 10 ? "0" + value : String(value);
      }

      /*
        Paint one cell. Both layers are updated, and only when the character
        actually changed, so a normal tick touches at most a couple of digits.
      */
      function paintCell(record, character) {
        var lit = SEGMENT_MAP[character] || "";
        var i;
        var name;
        var node;

        if (record.value === character) {
          return;
        }

        record.value = character;

        for (i = 0; i < SEGMENTS.length; i++) {
          name = SEGMENTS[i];
          node = record.segments[name];
          node.className = segmentClass(name) + (lit.indexOf(name) === -1 ? "" : " on");
        }

        for (i = 0; i < 10; i++) {
          record.numerals[i].className = "num num-" + i + (String(i) === character ? " on" : "");
        }
      }

      function drawTime(now) {
        var hours = now.getHours();
        var minutes = pad(now.getMinutes());
        var seconds = pad(now.getSeconds());
        var text;

        if (settings.hour12) {
          meridiemNode.innerHTML = hours < 12 ? "AM" : "PM";
          hours = hours % 12;

          if (hours === 0) {
            hours = 12;
          }

          /* A real 12 hour clock blanks the leading zero instead of showing it. */
          text = hours < 10 ? " " + hours : String(hours);
        } else {
          text = pad(hours);
        }

        paintCell(cells.ht, text.charAt(0));
        paintCell(cells.ho, text.charAt(1));
        paintCell(cells.mt, minutes.charAt(0));
        paintCell(cells.mo, minutes.charAt(1));
        paintCell(cells.st, seconds.charAt(0));
        paintCell(cells.so, seconds.charAt(1));
      }

      function drawDate(now) {
        var key = now.getFullYear() + "-" + now.getMonth() + "-" + now.getDate() + "-" + settings.language;
        var lang = settings.language === "ru" ? "ru" : "en";

        if (key === lastDateKey) {
          return;
        }

        lastDateKey = key;
        dateNode.innerHTML = DAY_NAMES[lang][now.getDay()] + " " + now.getDate() + " " + MONTH_NAMES[lang][now.getMonth()];
      }

      /* ---------------------------------------------------------------
         Where the night is
         --------------------------------------------------------------- */

      /*
        The two ends of the night are not symmetric, so they are decided
        differently.

        Evening is fixed at 23:00. Dusk is not the moment a room goes dark - the
        lights are on long before the sun is down, and following sunset would dim
        the clock at nine in the summer while the room is still lit. What the
        evening actually tracks is bedtime, and that is a clock time.

        Morning is whichever comes first, sunrise or 07:00. Sunrise is the end
        that matters in summer: at six the sun is already up, and digits lit at
        half strength wash out completely against it, which is the bug this
        replaced. In winter sunrise is far too late to wait for - it is past nine
        in December - so 07:00 caps it and the clock is at full strength for the
        morning either way.

        Reading the actual light would be the honest fix, but no iPad can do it -
        Safari has never implemented the Ambient Light Sensor on any version of
        iOS, and the old devicelight event was Firefox only. The sun, though, is
        pure arithmetic from the date and the coordinates, so with a location the
        clock knows today's sunrise without a network, a sensor, or a stored table.

        The algorithm below is the standard low precision solar one (as used by
        SunCalc): accurate to well under a minute, which is far past what matters
        for deciding whether to dim a wall clock.
      */
      var DIM_START_HOUR = 23;      /* evening is a clock time, not a solar one */
      var DIM_MORNING_LIMIT = 7;    /* the latest the clock will stay dimmed, whatever the sun does */
      var RAD = Math.PI / 180;
      var DAY_MS = 86400000;
      var J1970 = 2440588;
      var J2000 = 2451545;
      var OBLIQUITY = RAD * 23.4397;
      /* Centre of the solar disc sits 0.833 deg below the horizon at sunrise, refraction included. */
      var SUN_ALTITUDE = RAD * -0.833;

      var sunCache = null;      /* { key: "y-m-d", sunrise: Date, sunset: Date, polar: 0 | 1 | -1 } */

      function toJulian(date) {
        return date.valueOf() / DAY_MS - 0.5 + J1970;
      }

      function fromJulian(julian) {
        return new Date((julian + 0.5 - J1970) * DAY_MS);
      }

      /*
        Sunrise and sunset for the calendar day the given moment falls in.
        Returns polar: 1 when the sun never sets that day and -1 when it never
        rises, in which case the two times are meaningless and left out.
      */
      function sunTimes(date, latitude, longitude) {
        var lw = RAD * -longitude;
        var phi = RAD * latitude;
        var d = toJulian(date) - J2000;
        var n = Math.round(d - 0.0009 - lw / (2 * Math.PI));
        var ds = 0.0009 + lw / (2 * Math.PI) + n;
        var M = RAD * (357.5291 + 0.98560028 * ds);
        var C = RAD * (1.9148 * Math.sin(M) + 0.02 * Math.sin(2 * M) + 0.0003 * Math.sin(3 * M));
        var L = M + C + RAD * 102.9372 + Math.PI;
        var noon = J2000 + ds + 0.0053 * Math.sin(M) - 0.0069 * Math.sin(2 * L);
        var declination = Math.asin(Math.sin(OBLIQUITY) * Math.sin(L));
        var cosHourAngle = (Math.sin(SUN_ALTITUDE) - Math.sin(phi) * Math.sin(declination)) /
          (Math.cos(phi) * Math.cos(declination));
        var hourAngle;
        var setJulian;

        /* Above the polar circles the sun can stay up, or stay down, for the whole day. */
        if (cosHourAngle >= 1) {
          return { polar: -1 };
        }

        if (cosHourAngle <= -1) {
          return { polar: 1 };
        }

        hourAngle = Math.acos(cosHourAngle);
        ds = 0.0009 + (hourAngle + lw) / (2 * Math.PI) + n;
        setJulian = J2000 + ds + 0.0053 * Math.sin(M) - 0.0069 * Math.sin(2 * L);

        return {
          polar: 0,
          sunset: fromJulian(setJulian),
          sunrise: fromJulian(noon - (setJulian - noon))
        };
      }

      /*
        The sun moves slowly enough that today's times are worth keeping until the
        date rolls over; applyDim runs five times a second.
      */
      function sunToday(now) {
        var key;

        if (!hasLocation()) {
          return null;
        }

        key = now.getFullYear() + "-" + now.getMonth() + "-" + now.getDate();

        if (!sunCache || sunCache.key !== key) {
          sunCache = sunTimes(now, settings.latitude, settings.longitude);
          sunCache.key = key;
        }

        return sunCache;
      }

      function hasLocation() {
        return typeof settings.latitude === "number" && typeof settings.longitude === "number";
      }

      /*
        When the dimming lifts in the morning: sunrise, or DIM_MORNING_LIMIT if
        sunrise is later than that. Without coordinates, and on the polar days
        where the sun never crosses the horizon at all, there is no sunrise to
        use and the limit is the whole answer.
      */
      function morningEnd(now) {
        var limit = new Date(now.getFullYear(), now.getMonth(), now.getDate(), DIM_MORNING_LIMIT, 0, 0, 0);
        var sun = sunToday(now);

        if (sun && !sun.polar && sun.sunrise < limit) {
          return sun.sunrise;
        }

        return limit;
      }

      function isNight(now) {
        return now.getHours() >= DIM_START_HOUR || now < morningEnd(now);
      }

      function applyDim(now) {
        var dim = settings.autoDim && isNight(now);

        if (dim !== lastDimState) {
          lastDimState = dim;
          /* The class strips the panels and backlights; the opacity sets the level. */
          setFlag("dim", dim);
          clockNode.style.opacity = dim ? settings.nightBrightness / 100 : "";
        }
      }

      function drawColon(now) {
        var blink = settings.blink && now.getSeconds() % 2 === 1;
        var next = blink ? "cell colon blink" : "cell colon";

        if (colonCell.className !== next) {
          colonCell.className = next;
        }
      }

      function tick() {
        var now = new Date();

        drawTime(now);
        drawColon(now);
        drawDate(now);
        applyDim(now);
        checkViewport();
      }

      /*
        Safety net for the layout. Safari on iOS 9 sometimes reports the old size
        inside the orientationchange handler, and a page restored from the home
        screen can come back at a size we never saw an event for. Comparing the
        viewport on every tick costs nothing and makes those cases self healing.
      */
      function checkViewport() {
        var size = (window.innerWidth || 0) + "x" + (window.innerHeight || 0);

        if (size !== lastViewport) {
          applyMetrics();
        }
      }

      /*
        How far the clock is allowed to travel: whatever the layout left unused,
        minus a pixel so that a glow never touches the edge of the screen. The
        room reserved in applyMetrics() is the floor; the slack of whichever axis
        is not the binding one comes on top of it for free, and DRIFT_CAP stops
        the clock from wandering half a screen when that slack is large.
      */
      function measureDrift(viewportW, viewportH) {
        var freeX = Math.floor((viewportW - clockNode.offsetWidth) / 2) - 1;
        var freeY = Math.floor((viewportH - clockNode.offsetHeight) / 2) - 1;

        driftX = Math.max(0, Math.min(Math.round(viewportW * DRIFT_CAP), freeX));
        driftY = Math.max(0, Math.min(Math.round(viewportH * DRIFT_CAP), freeY));
        driftClock();
      }

      function driftClock() {
        var now = new Date().getTime();
        var x = Math.round(driftX * Math.sin(2 * Math.PI * now / DRIFT_X_PERIOD));
        var y = Math.round(driftY * Math.sin(2 * Math.PI * now / DRIFT_Y_PERIOD));
        var value = "translate(" + x + "px," + y + "px)";

        clockNode.style.webkitTransform = value;
        clockNode.style.transform = value;
      }

      /* ---------------------------------------------------------------
         Interaction
         --------------------------------------------------------------- */

      function showStatus(text) {
        statusNode.innerHTML = text;
        statusNode.className = "visible";

        if (statusTimer) {
          clearTimeout(statusTimer);
        }

        statusTimer = setTimeout(function () {
          statusNode.className = "";
        }, 1400);
      }

      function setSetting(name, value) {
        settings[name] = value;
        applyAll();
        saveSettings();
      }

      function cycleTheme() {
        var index = 0;
        var i;

        for (i = 0; i < THEMES.length; i++) {
          if (THEMES[i] === settings.theme) {
            index = i;
            break;
          }
        }

        setSetting("theme", THEMES[(index + 1) % THEMES.length]);
        showStatus(label("statusTheme") + label(settings.theme));
      }

      function toggleSeconds() {
        setSetting("showSeconds", !settings.showSeconds);
        showStatus(settings.showSeconds ? label("statusSecondsOn") : label("statusSecondsOff"));
      }

      function setOptionActive(containerId, attribute, value) {
        var buttons = document.getElementById(containerId).getElementsByTagName("span");
        var i;

        for (i = 0; i < buttons.length; i++) {
          buttons[i].className = buttons[i].getAttribute(attribute) === value ? "option-button active" : "option-button";
        }
      }

      function refreshSettingsUI() {
        setOptionActive("language-options", "data-language", settings.language);
        setOptionActive("mode-options", "data-mode", settings.mode);
        setOptionActive("theme-options", "data-theme", settings.theme);
        setOptionActive("format-options", "data-format", settings.hour12 ? "12" : "24");
        setOptionActive("weight-options", "data-weight", settings.weight);
        setOptionActive("seconds-options", "data-seconds", settings.showSeconds ? "on" : "off");
        setOptionActive("date-options", "data-date", settings.showDate ? "on" : "off");
        setOptionActive("blink-options", "data-blink", settings.blink ? "on" : "off");
        setOptionActive("dim-options", "data-dim", settings.autoDim ? "auto" : "off");
        dimRange.value = settings.nightBrightness;
        dimRange.disabled = !settings.autoDim;
        dimValue.innerHTML = settings.nightBrightness + "%";
        dimHint.innerHTML = dimHintText(new Date());
      }

      /* Spells out tonight's actual window, so the setting can be trusted without waiting for dusk. */
      function dimHintText(now) {
        var end = morningEnd(now);
        var text = label("dimWindow") + " " + pad(DIM_START_HOUR) + ":00 " +
          label("dimUntil") + " " + clockTime(end);

        /* Say so when the sun, not the cap, is what lifts it. */
        if (end.getHours() !== DIM_MORNING_LIMIT || end.getMinutes() !== 0) {
          text += " " + label("dimAtSunrise");
        }

        text += ".";

        if (!hasLocation()) {
          text += " " + label("dimNoLocation");
        }

        return text;
      }

      function clockTime(date) {
        return pad(date.getHours()) + ":" + pad(date.getMinutes());
      }

      /*
        While the slider is being dragged the clock is dimmed to the chosen
        level right away, whatever the hour, so the setting can be judged in the
        daytime when the night window is hours off. lastDimState is left untouched
        so the running tick does not fight the preview, and saveNightBrightness
        drops it again on release.
      */
      function changeNightBrightness() {
        var value = parseInt(dimRange.value, 10);

        if (!isFinite(value)) {
          return;
        }

        settings.nightBrightness = Math.max(10, Math.min(80, value));
        dimValue.innerHTML = settings.nightBrightness + "%";
        /* Preview the night as it really looks: blacked out panel, not just a level. */
        setFlag("dim", true);
        clockNode.style.opacity = settings.nightBrightness / 100;
      }

      function saveNightBrightness() {
        changeNightBrightness();
        saveSettings();
        /* Let go of the preview and return to the brightness the current hour calls for. */
        lastDimState = null;
        tick();
      }

      function toggleSettingsPanel(forceOpen) {
        var open = typeof forceOpen === "boolean" ? forceOpen : !hasClass("settings-open");

        /* Sunset and sunrise move every day, so the hint is rebuilt each time the panel is shown. */
        if (open) {
          refreshSettingsUI();
        }

        setFlag("settings-open", open);
      }

      /*
        Every settings button carries one data-* attribute. This table maps that
        attribute to the setting it changes and to the status message to show.
      */
      var SETTING_ACTIONS = [
        { attribute: "data-language", apply: function (v) { setSetting("language", v); return label("statusLanguage") + label(v === "en" ? "english" : "russian"); } },
        { attribute: "data-mode", apply: function (v) { setSetting("mode", v); return label("statusDisplay") + label(v); } },
        { attribute: "data-theme", apply: function (v) { setSetting("theme", v); return label("statusTheme") + label(v); } },
        { attribute: "data-format", apply: function (v) { setSetting("hour12", v === "12"); return label("statusFormat") + label(v === "12" ? "h12" : "h24"); } },
        { attribute: "data-weight", apply: function (v) { setSetting("weight", v); return label("statusWeight") + label(v); } },
        { attribute: "data-seconds", apply: function (v) { setSetting("showSeconds", v === "on"); return label(v === "on" ? "statusSecondsOn" : "statusSecondsOff"); } },
        { attribute: "data-date", apply: function (v) { setSetting("showDate", v === "on"); return label(v === "on" ? "statusDateOn" : "statusDateOff"); } },
        { attribute: "data-blink", apply: function (v) { setSetting("blink", v === "on"); return label(v === "on" ? "statusBlinkOn" : "statusBlinkOff"); } },
        { attribute: "data-dim", apply: function (v) { setSetting("autoDim", v === "auto"); return label(v === "auto" ? "statusDimAuto" : "statusDimOff"); } }
      ];

      function handleSettingsClick(event) {
        var target = event.target || event.srcElement;
        var i;
        var value;

        for (i = 0; i < SETTING_ACTIONS.length; i++) {
          value = target.getAttribute(SETTING_ACTIONS[i].attribute);

          if (value) {
            event.preventDefault();

            if (event.stopPropagation) {
              event.stopPropagation();
            }

            showStatus(SETTING_ACTIONS[i].apply(value));
            toggleSettingsPanel(false);
            return;
          }
        }
      }

      function isInsideSettings(node) {
        while (node) {
          if (node === settingsPanel) {
            return true;
          }

          node = node.parentNode;
        }

        return false;
      }

      function startHold(event) {
        var target = event.target || event.srcElement;

        if (event.touches && event.touches.length > 1) {
          return;
        }

        if (target === settingsButton || isInsideSettings(target)) {
          return;
        }

        holdTriggered = false;
        holdTimer = setTimeout(function () {
          holdTriggered = true;
          toggleSeconds();
        }, 700);
      }

      function endHold() {
        if (holdTimer) {
          clearTimeout(holdTimer);
          holdTimer = null;
        }
      }

      function handleTap(event) {
        var target = event.target || event.srcElement;

        event.preventDefault();

        if (holdTriggered) {
          holdTriggered = false;
          return;
        }

        if (target === settingsButton) {
          toggleSettingsPanel();
          return;
        }

        if (isInsideSettings(target)) {
          return;
        }

        if (hasClass("settings-open")) {
          toggleSettingsPanel(false);
          return;
        }

        cycleTheme();
      }

      function handleResize() {
        if (resizeTimer) {
          clearTimeout(resizeTimer);
        }

        resizeTimer = setTimeout(applyMetrics, 120);
      }

      /* ---------------------------------------------------------------
         Offline and screen wake
         --------------------------------------------------------------- */

      /*
        Three generations of iPad in one place:
        - iOS 9 has no Service Worker and uses the Application Cache manifest,
        - modern iOS dropped the Application Cache and uses sw.js,
        - the Wake Lock API (iOS 16.4+) keeps the screen on; older iPads simply
          do not have it and rely on the device auto-lock setting.
      */
      function setupOffline() {
        if (window.applicationCache) {
          window.applicationCache.addEventListener("updateready", function () {
            try {
              window.applicationCache.swapCache();
              window.location.reload();
            } catch (error) {
              /* Nothing to do: the next launch will pick the new cache up. */
            }
          }, false);
        }

        if (navigator.serviceWorker && window.location.protocol.indexOf("http") === 0) {
          navigator.serviceWorker.register("sw.js").then(null, function () {});
        }
      }

      /*
        Asked for once, then remembered forever: a wall clock does not travel, and
        the coordinates only ever feed the morning end of the night. If the prompt
        is refused or the fix times out, that end falls back to DIM_MORNING_LIMIT
        and the window is simply 23:00 to 07:00, so nothing depends on the answer.
        Geolocation needs https, which
        the published page has; opened as a local file it simply does nothing.
      */
      function requestLocation() {
        if (!navigator.geolocation || hasLocation()) {
          return;
        }

        try {
          navigator.geolocation.getCurrentPosition(function (position) {
            if (!position || !position.coords) {
              return;
            }

            settings.latitude = position.coords.latitude;
            settings.longitude = position.coords.longitude;
            saveSettings();

            /* Recompute tonight from the sun instead of the clock, right away. */
            sunCache = null;
            lastDimState = null;
            refreshSettingsUI();
            tick();
          }, function () {
            /* Refused or unavailable: the fixed window stays in charge. */
          }, { enableHighAccuracy: false, timeout: 20000, maximumAge: 86400000 });
        } catch (error) {
          /* Old Safari can throw here outright; same fallback. */
        }
      }

      function requestWakeLock() {
        if (!navigator.wakeLock || wakeLock) {
          return;
        }

        try {
          navigator.wakeLock.request("screen").then(function (lock) {
            wakeLock = lock;
            lock.addEventListener("release", function () {
              wakeLock = null;
            });
          }, function () {});
        } catch (error) {
          /* Not supported here, the screen will follow the device settings. */
        }
      }

      /* ---------------------------------------------------------------
         Start
         --------------------------------------------------------------- */

      buildDisplay();
      collectI18nNodes();
      applyAll();          /* applyMetrics() inside it also places the clock on its drift path */
      setupOffline();
      requestWakeLock();
      requestLocation();

      setInterval(tick, 200);
      setInterval(driftClock, DRIFT_TICK);

      settingsPanel.onclick = handleSettingsClick;
      dimRange.oninput = changeNightBrightness;
      dimRange.onchange = saveNightBrightness;
      settingsPanel.ontouchstart = function (event) {
        if (event.stopPropagation) {
          event.stopPropagation();
        }
      };

      document.addEventListener("touchstart", startHold, false);
      document.addEventListener("touchend", endHold, false);
      document.addEventListener("touchcancel", endHold, false);
      document.addEventListener("click", handleTap, false);
      window.addEventListener("resize", handleResize, false);
      window.addEventListener("orientationchange", handleResize, false);

      document.addEventListener("visibilitychange", function () {
        if (!document.hidden) {
          requestWakeLock();
          applyMetrics();
          tick();
        }
      }, false);
    })();
  </script>
</body>
</html>
