<!DOCTYPE html>
<html manifest="clock.appcache">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="format-detection" content="telephone=no">
  <title>iPad Clock</title>
  <style>
    /*
      Old iPad Clock
      ----------------
      This file intentionally avoids modern browser features. Safari on iOS 9.3.5
      has no Service Worker support, so the project uses Application Cache and
      plain ES5 JavaScript. Keep that in mind when editing: no modules, no let/const,
      no arrow functions, no CSS custom properties.
    */

    /* Full-screen base: no scroll, no text selection, no external fonts. */
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070707;
      color: #ffc44d;
      font-family: Arial, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      display: table;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    /*
      The wrapper is vertically centered with display: table/table-cell because it
      is reliable on old Safari. The translateY value is a visual composition tweak:
      in landscape the clock looks better slightly above the mathematical center.
    */
    .wrap {
      display: table-cell;
      vertical-align: middle;
      padding: 4vh 4vw;
      -webkit-transform: translateY(-6vh);
      transform: translateY(-6vh);
    }

    /*
      Main clock panel.
      Retro mode uses this dark rounded panel. Flat mode removes the panel later,
      but reuses the same digit geometry.
    */
    #clock {
      display: inline-block;
      padding: 4vh 3vw;
      border-radius: 28px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.06), transparent 38%),
        linear-gradient(180deg, #151515, #080808 55%, #040404);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.04),
        inset 0 -2px 18px rgba(0, 0, 0, 0.65),
        0 18px 60px rgba(0, 0, 0, 0.45);
      margin-left: -1.2vw;
      -webkit-transform: translate(0, 0);
      transform: translate(0, 0);
    }

    /* Flat mode keeps bright digits but removes the retro device-like background. */
    body.style-flat #clock {
      padding: 1vh 0;
      border-radius: 0;
      background: none;
      box-shadow: none;
    }

    /* font-size: 0 removes inline-block whitespace between digit elements. */
    #time {
      white-space: nowrap;
      font-size: 0;
    }

    /*
      One seven-segment digit.
      The width/height values are tuned for iPad mini landscape first. Portrait
      values are overridden in the media query at the end of the stylesheet.
    */
    .digit {
      position: relative;
      display: inline-block;
      width: 18.8vw;
      height: 31.8vw;
      margin: 0 0.72vw;
      vertical-align: middle;
    }

    /*
      A segment is dark by default. JavaScript adds the "on" class to light it.
      The segment names are:
      a = top, b = upper right, c = lower right, d = bottom,
      e = lower left, f = upper left, g = middle.
    */
    .digit .seg {
      position: absolute;
      background: rgba(90, 48, 0, 0.24);
      border-radius: 999px;
      box-shadow:
        inset 0 1px 0 rgba(255, 198, 77, 0.08),
        0 0 10px rgba(255, 148, 0, 0.05);
    }

    /* Lit segment glow for retro mode. currentColor comes from the selected theme. */
    .digit .seg.on {
      background: currentColor;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.36),
        0 0 12px rgba(255, 226, 142, 0.9),
        0 0 28px rgba(255, 174, 0, 0.62),
        0 0 54px rgba(255, 128, 0, 0.34),
        0 0 78px rgba(255, 90, 0, 0.16);
    }

    /* Flat mode uses the same brightness, but square ends and no device panel. */
    body.style-flat .digit .seg.on {
      background: currentColor;
      box-shadow:
        0 0 10px rgba(255, 196, 77, 0.55),
        0 0 24px rgba(255, 140, 0, 0.32);
      border-radius: 2px;
    }

    body.style-flat .digit .seg {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: none;
      border-radius: 2px;
    }

    body.style-flat #colon:before,
    body.style-flat #colon:after {
      background: currentColor;
      box-shadow:
        0 0 8px rgba(255, 196, 77, 0.45),
        0 0 18px rgba(255, 140, 0, 0.28);
      border-radius: 2px;
    }

    body.style-flat .digit {
      margin: 0 0.45vw;
    }

    body.style-flat #colon {
      margin: 0 0.45vw;
    }

    /* Horizontal segment placement. */
    .seg-a,
    .seg-d,
    .seg-g {
      left: 18%;
      width: 64%;
      height: 7%;
    }

    body.weight-bold .seg-a,
    body.weight-bold .seg-d,
    body.weight-bold .seg-g {
      left: 18%;
      width: 64%;
      height: 8.5%;
    }

    .seg-a {
      top: 4%;
    }

    .seg-g {
      top: 46.5%;
    }

    .seg-d {
      bottom: 4%;
    }

    /* Vertical segment placement. */
    .seg-b,
    .seg-c,
    .seg-e,
    .seg-f {
      width: 12%;
      height: 32%;
    }

    body.weight-bold .seg-b,
    body.weight-bold .seg-c,
    body.weight-bold .seg-e,
    body.weight-bold .seg-f {
      width: 14%;
      height: 31%;
    }

    .seg-b,
    .seg-c {
      right: 7%;
    }

    .seg-e,
    .seg-f {
      left: 7%;
    }

    .seg-f,
    .seg-b {
      top: 13%;
    }

    .seg-e,
    .seg-c {
      bottom: 13%;
    }

    body.weight-bold .seg-f,
    body.weight-bold .seg-b {
      top: 14%;
    }

    body.weight-bold .seg-e,
    body.weight-bold .seg-c {
      bottom: 14%;
    }

    /* The colon is drawn with pseudo-elements so it can blink independently. */
    #colon {
      position: relative;
      display: inline-block;
      width: 5.5vw;
      height: 31.8vw;
      margin: 0 0.82vw;
      vertical-align: middle;
    }

    #colon:before,
    #colon:after {
      content: "";
      position: absolute;
      left: 50%;
      width: 1.82vw;
      height: 1.82vw;
      margin-left: -0.91vw;
      border-radius: 50%;
      background: currentColor;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.36),
        0 0 11px rgba(255, 226, 142, 0.84),
        0 0 26px rgba(255, 174, 0, 0.54),
        0 0 46px rgba(255, 128, 0, 0.28);
    }

    #colon:before {
      top: 32%;
    }

    #colon:after {
      bottom: 32%;
    }

    #colon.blink:before,
    #colon.blink:after {
      opacity: 0.28;
      box-shadow: none;
    }

    /*
      Seconds are present in the DOM but collapsed by default. When the body gets
      show-seconds, the main digits shrink and the small seconds block becomes
      visible, so the full HH:MM:SS layout still fits on the iPad screen.
    */
    .seconds {
      display: inline-block;
      width: 0;
      overflow: hidden;
      opacity: 0;
      vertical-align: bottom;
      -webkit-transition: opacity 0.2s ease;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }

    body.show-seconds .seconds {
      width: auto;
      opacity: 1;
    }

    body.show-seconds .digit {
      width: 11.8vw;
      height: 20vw;
      margin: 0 0.38vw;
    }

    body.show-seconds #colon {
      width: 3.8vw;
      height: 20vw;
      margin: 0 0.55vw;
    }

    body.show-seconds #colon:before,
    body.show-seconds #colon:after {
      width: 1.2vw;
      height: 1.2vw;
      margin-left: -0.6vw;
    }

    body.show-seconds .seconds .digit {
      width: 5.2vw;
      height: 8.8vw;
      margin: 0 0.08vw;
      vertical-align: bottom;
    }

    body.show-seconds .seconds .seg-a,
    body.show-seconds .seconds .seg-d,
    body.show-seconds .seconds .seg-g {
      height: 9%;
    }

    body.show-seconds.weight-bold .seconds .seg-a,
    body.show-seconds.weight-bold .seconds .seg-d,
    body.show-seconds.weight-bold .seconds .seg-g {
      height: 10.5%;
    }

    body.show-seconds .seconds .seg-b,
    body.show-seconds .seconds .seg-c,
    body.show-seconds .seconds .seg-e,
    body.show-seconds .seconds .seg-f {
      width: 14%;
      height: 29%;
    }

    body.show-seconds.weight-bold .seconds .seg-b,
    body.show-seconds.weight-bold .seconds .seg-c,
    body.show-seconds.weight-bold .seconds .seg-e,
    body.show-seconds.weight-bold .seconds .seg-f {
      width: 16%;
      height: 28%;
    }

    /* Small temporary message after changing a setting. */
    #status {
      position: fixed;
      left: 50%;
      bottom: 5vh;
      max-width: 84vw;
      padding: 0.7em 1em;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      font-size: 3.6vw;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      background: rgba(0, 0, 0, 0.35);
      -webkit-transform: translate(-50%, 10px);
      transform: translate(-50%, 10px);
      -webkit-transition: opacity 0.25s ease, -webkit-transform 0.25s ease;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    #status.visible {
      opacity: 0.9;
      -webkit-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    /* Quiet settings entry point. It stays visible but does not compete with the clock. */
    #settings-button {
      position: fixed;
      top: 4vh;
      right: 3vw;
      z-index: 20;
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.16);
      color: rgba(255, 255, 255, 0.48);
      font-size: 20px;
      line-height: 36px;
      text-align: center;
      cursor: pointer;
    }

    /*
      Settings panel. It is plain HTML controls instead of form elements because
      old mobile Safari styling is more predictable this way.
    */
    #settings-panel {
      position: fixed;
      top: 9vh;
      right: 3vw;
      z-index: 21;
      width: 74vw;
      max-width: 420px;
      padding: 18px 18px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      background: rgba(10, 10, 10, 0.94);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      text-align: left;
      opacity: 0;
      visibility: hidden;
      -webkit-transform: translate(0, -10px);
      transform: translate(0, -10px);
      -webkit-transition: opacity 0.2s ease, -webkit-transform 0.2s ease;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    body.settings-open #settings-panel {
      opacity: 1;
      visibility: visible;
      -webkit-transform: translate(0, 0);
      transform: translate(0, 0);
    }

    .settings-title {
      margin: 0 0 12px;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.76);
    }

    .settings-row {
      margin-bottom: 12px;
    }

    .settings-label {
      margin-bottom: 7px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.56);
    }

    .settings-options {
      font-size: 0;
    }

    .option-button {
      display: inline-block;
      margin: 0 8px 8px 0;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.84);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .option-button.active {
      border-color: currentColor;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .settings-hint {
      margin-top: 2px;
      font-size: 11px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.42);
    }

    /* Color themes. These classes are applied to body by JavaScript. */
    body.theme-amber {
      background: #070707;
      color: #ffc44d;
    }

    body.theme-red {
      background: #060606;
      color: #ff695d;
    }

    body.theme-green {
      background: #060807;
      color: #83ff9a;
    }

    body.theme-ice {
      background: #050709;
      color: #98efff;
    }

    body.style-flat.theme-amber {
      background: #101010;
      color: #ffd166;
    }

    body.style-flat.theme-red {
      background: #120d0d;
      color: #ff7b72;
    }

    body.style-flat.theme-green {
      background: #0c100d;
      color: #8df5a6;
    }

    body.style-flat.theme-ice {
      background: #0c1013;
      color: #9ad7ff;
    }

    /* Night dimming keeps the background black and dims only the clock panel. */
    body.dim #clock {
      opacity: 0.56;
    }

    /*
      Portrait mode is secondary for this project. It is constrained more tightly
      so the retro panel cannot run beyond the right edge of the screen.
    */
    @media (orientation: portrait) {
      .wrap {
        padding-left: 0;
        padding-right: 0;
        -webkit-transform: translateY(-3vh);
        transform: translateY(-3vh);
      }

      #clock {
        margin-left: 0;
        padding-left: 2vw;
        padding-right: 2vw;
        max-width: 94vw;
        box-sizing: border-box;
      }

      .digit {
        width: 18.2vw;
        height: 32.2vw;
        margin: 0 0.48vw;
      }

      #colon {
        width: 5.2vw;
        height: 32.2vw;
        margin: 0 0.52vw;
      }

      #colon:before,
      #colon:after {
        width: 1.9vw;
        height: 1.9vw;
        margin-left: -0.95vw;
      }

      body.show-seconds .seconds .digit {
        width: 4.8vw;
        height: 8.4vw;
        margin: 0 0.08vw;
      }

      body.show-seconds .digit {
        width: 12.4vw;
        height: 21.6vw;
        margin: 0 0.24vw;
      }

      body.show-seconds #colon {
        width: 3.9vw;
        height: 21.6vw;
        margin: 0 0.36vw;
      }

      body.show-seconds #colon:before,
      body.show-seconds #colon:after {
        width: 1.3vw;
        height: 1.3vw;
        margin-left: -0.65vw;
      }

      #status {
        font-size: 4.4vw;
      }
    }
  </style>
</head>
<body>
  <!-- Clock face: each digit is seven spans, one for each segment. -->
  <div class="wrap">
    <div id="clock">
      <div id="time">
        <div class="digit" id="hours-tens">
          <span class="seg seg-a"></span><span class="seg seg-b"></span><span class="seg seg-c"></span><span class="seg seg-d"></span><span class="seg seg-e"></span><span class="seg seg-f"></span><span class="seg seg-g"></span>
        </div>
        <div class="digit" id="hours-ones">
          <span class="seg seg-a"></span><span class="seg seg-b"></span><span class="seg seg-c"></span><span class="seg seg-d"></span><span class="seg seg-e"></span><span class="seg seg-f"></span><span class="seg seg-g"></span>
        </div>
        <div id="colon"></div>
        <div class="digit" id="minutes-tens">
          <span class="seg seg-a"></span><span class="seg seg-b"></span><span class="seg seg-c"></span><span class="seg seg-d"></span><span class="seg seg-e"></span><span class="seg seg-f"></span><span class="seg seg-g"></span>
        </div>
        <div class="digit" id="minutes-ones">
          <span class="seg seg-a"></span><span class="seg seg-b"></span><span class="seg seg-c"></span><span class="seg seg-d"></span><span class="seg seg-e"></span><span class="seg seg-f"></span><span class="seg seg-g"></span>
        </div>
        <div class="seconds" id="seconds-wrap">
          <div class="digit" id="seconds-tens">
            <span class="seg seg-a"></span><span class="seg seg-b"></span><span class="seg seg-c"></span><span class="seg seg-d"></span><span class="seg seg-e"></span><span class="seg seg-f"></span><span class="seg seg-g"></span>
          </div>
          <div class="digit" id="seconds-ones">
            <span class="seg seg-a"></span><span class="seg seg-b"></span><span class="seg seg-c"></span><span class="seg seg-d"></span><span class="seg seg-e"></span><span class="seg seg-f"></span><span class="seg seg-g"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- The settings UI is intentionally simple and touch-friendly for old Safari. -->
  <div id="settings-button">+</div>
  <div id="settings-panel">
    <div class="settings-title" data-i18n="settingsTitle">Clock Settings</div>
    <div class="settings-row">
      <div class="settings-label" data-i18n="language">Language</div>
      <div class="settings-options" id="language-options">
        <span class="option-button" data-language="en" data-i18n="english">English</span>
        <span class="option-button" data-language="ru" data-i18n="russian">Russian</span>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label" data-i18n="style">Style</div>
      <div class="settings-options" id="style-options">
        <span class="option-button" data-style="retro" data-i18n="retro">Retro</span>
        <span class="option-button" data-style="flat" data-i18n="flat">Flat</span>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label" data-i18n="theme">Theme</div>
      <div class="settings-options" id="theme-options">
        <span class="option-button" data-theme="amber" data-i18n="amber">Amber</span>
        <span class="option-button" data-theme="red" data-i18n="red">Red</span>
        <span class="option-button" data-theme="green" data-i18n="green">Green</span>
        <span class="option-button" data-theme="ice" data-i18n="ice">Ice</span>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label" data-i18n="weight">Weight</div>
      <div class="settings-options" id="weight-options">
        <span class="option-button" data-weight="thin" data-i18n="thin">Thin</span>
        <span class="option-button" data-weight="bold" data-i18n="bold">Bold</span>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label" data-i18n="seconds">Seconds</div>
      <div class="settings-options" id="seconds-options">
        <span class="option-button" data-seconds="off" data-i18n="off">Off</span>
        <span class="option-button" data-seconds="on" data-i18n="on">On</span>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label" data-i18n="colonBlink">Colon Blink</div>
      <div class="settings-options" id="blink-options">
        <span class="option-button" data-blink="on" data-i18n="on">On</span>
        <span class="option-button" data-blink="off" data-i18n="off">Off</span>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label" data-i18n="nightDim">Night Dim</div>
      <div class="settings-options" id="dim-options">
        <span class="option-button" data-dim="auto" data-i18n="auto">Auto</span>
        <span class="option-button" data-dim="off" data-i18n="off">Off</span>
      </div>
    </div>
    <div class="settings-hint" data-i18n="hint">Tap plus to open settings. Tap screen outside the panel to switch themes quickly. Hold on the clock to toggle seconds.</div>
  </div>
  <div id="status"></div>

  <script>

      /*

        JavaScript only toggles classes; the actual segment shape is CSS.
      */
      var digitMap = {

        "1": ["b", "c"],
        "2": ["a", "b", "d", "e", "g"],

      var themes = ["amber", "red", "green", "ice"];

      var labels = {

          colonBlink: "Мигание",
          nightDim: "Ночной режим",
          on: "Вкл",
          off: "Выкл",
          auto: "Авто",
          hint: "Нажмите плюс для настроек. Нажатие по часам меняет цвет. Долгое нажатие включает или выключает секунды.",
          statusLanguage: "язык: ",
          statusStyle: "стиль: ",
          statusTheme: "цвет: ",
          statusWeight: "толщина: ",
          statusSecondsOn: "секунды включены",
          statusSecondsOff: "секунды выключены",
          statusBlinkOn: "мигание включено",
          statusBlinkOff: "мигание выключено",
          statusDimAuto: "ночной режим авто",
          statusDimOff: "ночной режим выкл"
        }
      };
      var settings = loadSettings();
      var holdTimer = null;
      var holdTriggered = false;
      var statusTimer = null;
      var shiftIndex = 0;

      /*
        Very small burn-in protection. Every few minutes the clock panel moves by
        one pixel. It should be invisible in normal use but avoids keeping every
        lit pixel in the exact same place for days.
      */
      var shiftPositions = [
        { x: 0, y: 0 },
        { x: 1, y: 0 },
        { x: 1, y: 1 },
        { x: 0, y: 1 },
        { x: -1, y: 1 },
        { x: -1, y: 0 },
        { x: -1, y: -1 },
        { x: 0, y: -1 },
        { x: 1, y: -1 }
      ];

      function pad(value) {
        return value < 10 ? "0" + value : String(value);
      }

      /*
        Settings are stored locally on the iPad. If localStorage is unavailable
        or contains invalid JSON, the clock falls back to safe defaults.
      */
      function loadSettings() {
        var raw;

        try {
          raw = window.localStorage ? window.localStorage.getItem("clockSettings") : null;
        } catch (error) {
          raw = null;
        }

        if (!raw) {
          return {
            theme: "amber",
            showSeconds: false,
            style: "retro",
            weight: "thin",
            language: "en",
            blink: true,
            autoDim: true
          };
        }

        try {
          return JSON.parse(raw);
        } catch (error) {
          return {
            theme: "amber",
            showSeconds: false,
            style: "retro",
            weight: "thin",
            language: "en",
            blink: true,
            autoDim: true
          };
        }
      }

      /* Older saved settings may miss newer fields, so normalize before using. */
      function normalizeSettings() {
        if (!hasValue(themes, settings.theme)) {
          settings.theme = "amber";
        }

        if (!hasValue(styles, settings.style)) {
          settings.style = "retro";
        }

        if (!hasValue(weights, settings.weight)) {
          settings.weight = "thin";
        }

        if (!hasValue(languages, settings.language)) {
          settings.language = "en";
        }

        settings.showSeconds = !!settings.showSeconds;
        settings.blink = settings.blink !== false;
        settings.autoDim = settings.autoDim !== false;
      }

      function hasValue(list, value) {
        var i;

        for (i = 0; i < list.length; i++) {
          if (list[i] === value) {
            return true;
          }
        }

        return false;
      }

      function saveSettings() {
        try {
          if (window.localStorage) {
            window.localStorage.setItem("clockSettings", JSON.stringify(settings));
          }
        } catch (error) {}
      }

      /*
        Helper for body-level feature flags such as show-seconds, style-flat,
        weight-bold, dim and settings-open. classList would be nicer, but manual
        className editing is safer on old iOS Safari.
      */
      function setClassFlag(className, enabled) {
        if (enabled) {
          if (body.className.indexOf(className) === -1) {
            body.className += (body.className ? " " : "") + className;
          }
        } else {
          body.className = body.className.replace(new RegExp("(^|\\s)" + className + "(\\s|$)", "g"), " ").replace(/\s+/g, " ").replace(/^\s+|\s+$/g, "");
        }
      }

      /* Apply the selected visual theme by swapping body.theme-* classes. */
      function applyTheme() {
        var i;

        for (i = 0; i < themes.length; i++) {
          body.className = body.className.replace(new RegExp("(^|\\s)theme-" + themes[i] + "(\\s|$)", "g"), " ");
        }

        body.className = body.className.replace(/\s+/g, " ").replace(/^\s+|\s+$/g, "");
        body.className += (body.className ? " " : "") + "theme-" + settings.theme;
      }

      function applySeconds() {
        setClassFlag("show-seconds", settings.showSeconds);
      }

      function applyStyle() {
        setClassFlag("style-flat", settings.style === "flat");
      }

      function applyWeight() {
        setClassFlag("weight-bold", settings.weight === "bold");
      }

      function getLabel(key) {
        return labels[settings.language][key] || labels.en[key] || key;
      }

      function applyLanguage() {
        var nodes = document.getElementsByTagName("*");
        var i;
        var key;

        for (i = 0; i < nodes.length; i++) {
          key = nodes[i].getAttribute("data-i18n");
          if (key) {
            nodes[i].innerHTML = getLabel(key);
          }
        }
      }

      function applyDim(now) {
        var hour = now.getHours();
        setClassFlag("dim", settings.autoDim && (hour >= 22 || hour < 7));
      }

      /* Brief feedback label after tapping a setting. */
      function showStatus(text) {
        statusNode.innerHTML = text;
        statusNode.className = "visible";

        if (statusTimer) {
          clearTimeout(statusTimer);
        }

        statusTimer = setTimeout(function () {
          statusNode.className = "";
        }, 1400);
      }

      /* Quick tap on the clock cycles through color themes. */
      function cycleTheme() {
        var index = 0;
        var i;

        for (i = 0; i < themes.length; i++) {
          if (themes[i] === settings.theme) {
            index = i;
            break;
          }
        }

        settings.theme = themes[(index + 1) % themes.length];
        applyTheme();
        saveSettings();
        showStatus(getLabel("statusTheme") + getLabel(settings.theme));
        refreshSettingsUI();
      }

      /* Long press on the clock toggles seconds without opening the settings panel. */
      function toggleSeconds() {
        settings.showSeconds = !settings.showSeconds;
        applySeconds();
        saveSettings();
        showStatus(settings.showSeconds ? getLabel("statusSecondsOn") : getLabel("statusSecondsOff"));
        refreshSettingsUI();
      }

      /* Shared path for settings panel buttons. */
      function setSetting(name, value) {
        settings[name] = value;
        applyTheme();
        applySeconds();
        applyStyle();
        applyWeight();
        applyLanguage();
        saveSettings();
        refreshSettingsUI();
      }

      /* Mark the active option in a segmented settings row. */
      function setOptionActive(containerId, attr, value) {
        var container = document.getElementById(containerId);
        var buttons = container.getElementsByTagName("span");
        var i;

        for (i = 0; i < buttons.length; i++) {
          if (buttons[i].getAttribute(attr) === value) {
            buttons[i].className = "option-button active";
          } else {
            buttons[i].className = "option-button";
          }
        }
      }

      function refreshSettingsUI() {
        setOptionActive("language-options", "data-language", settings.language);
        setOptionActive("style-options", "data-style", settings.style);
        setOptionActive("theme-options", "data-theme", settings.theme);
        setOptionActive("weight-options", "data-weight", settings.weight);
        setOptionActive("seconds-options", "data-seconds", settings.showSeconds ? "on" : "off");
        setOptionActive("blink-options", "data-blink", settings.blink ? "on" : "off");
        setOptionActive("dim-options", "data-dim", settings.autoDim ? "auto" : "off");
      }

      function toggleSettingsPanel(forceOpen) {
        var open = typeof forceOpen === "boolean" ? forceOpen : body.className.indexOf("settings-open") === -1;
        setClassFlag("settings-open", open);
      }

      /* Read data-* attributes from the clicked settings option and apply it. */
      function handleSettingsClick(event) {
        var target = event.target || event.srcElement;
        var language = target.getAttribute("data-language");
        var style = target.getAttribute("data-style");
        var theme = target.getAttribute("data-theme");
        var weight = target.getAttribute("data-weight");
        var seconds = target.getAttribute("data-seconds");
        var blink = target.getAttribute("data-blink");
        var dim = target.getAttribute("data-dim");

        if (!language && !style && !theme && !weight && !seconds && !blink && !dim) {
          return;
        }

        event.preventDefault();
        event.cancelBubble = true;
        if (event.stopPropagation) {
          event.stopPropagation();
        }

        if (language) {
          setSetting("language", language);
          showStatus(getLabel("statusLanguage") + getLabel(language === "en" ? "english" : "russian"));
        } else if (style) {
          setSetting("style", style);
          showStatus(getLabel("statusStyle") + getLabel(style));
        } else if (theme) {
          setSetting("theme", theme);
          showStatus(getLabel("statusTheme") + getLabel(theme));
        } else if (weight) {
          setSetting("weight", weight);
          showStatus(getLabel("statusWeight") + getLabel(weight));
        } else if (seconds) {
          setSetting("showSeconds", seconds === "on");
          showStatus(seconds === "on" ? getLabel("statusSecondsOn") : getLabel("statusSecondsOff"));
        } else if (blink) {
          setSetting("blink", blink === "on");
          showStatus(blink === "on" ? getLabel("statusBlinkOn") : getLabel("statusBlinkOff"));
        } else if (dim) {
          setSetting("autoDim", dim === "auto");
          showStatus(dim === "auto" ? getLabel("statusDimAuto") : getLabel("statusDimOff"));
        }
      }

      /*
        Paint one seven-segment digit.
        Important detail: the segment letter is extracted from the stable seg-a
        class, not from the whole className. This prevents old "on" states from
        sticking when a digit changes from one number to another.
      */
      function paintDigit(node, value) {
        var segments = node.getElementsByClassName("seg");
        var active = digitMap[value];
        var i;
        var segmentName;
        var match;
        var isOn;

        for (i = 0; i < segments.length; i++) {
          match = segments[i].className.match(/seg-([a-g])/);
          segmentName = match ? match[1] : "";
          isOn = hasValue(active, segmentName);

          if (isOn) {
            segments[i].className = "seg seg-" + segmentName + " on";
          } else {
            segments[i].className = "seg seg-" + segmentName;
          }
        }
      }

      /* Convert the current Date into six digit values and paint the display. */
      function drawTime(now) {
        var hours = pad(now.getHours());
        var minutes = pad(now.getMinutes());
        var seconds = pad(now.getSeconds());

        paintDigit(digits.ht, hours.charAt(0));
        paintDigit(digits.ho, hours.charAt(1));
        paintDigit(digits.mt, minutes.charAt(0));
        paintDigit(digits.mo, minutes.charAt(1));
        paintDigit(digits.st, seconds.charAt(0));
        paintDigit(digits.so, seconds.charAt(1));
      }

      /* Move the whole clock by one pixel according to shiftPositions. */
      function updateShift() {
        var position = shiftPositions[shiftIndex];

        clockNode.style.webkitTransform = "translate(" + position.x + "px," + position.y + "px)";
        clockNode.style.transform = "translate(" + position.x + "px," + position.y + "px)";
        shiftIndex = (shiftIndex + 1) % shiftPositions.length;
      }

      /* Main clock tick: repaint digits, apply night dimming and blink colon. */
      function updateClock() {
        var now = new Date();

        drawTime(now);
        applyDim(now);
        if (settings.blink) {
          colonNode.className = now.getSeconds() % 2 === 0 ? "" : "blink";
        } else {
          colonNode.className = "";
        }
      }

      /* Start long-press detection unless the user is touching the settings UI. */
      function startHold(event) {
        var target = event.target || event.srcElement;

        if (event && event.touches && event.touches.length > 1) {
          return;
        }

        if (target === settingsButton || isInsideSettings(target)) {
          return;
        }

        holdTriggered = false;
        holdTimer = setTimeout(function () {
          holdTriggered = true;
          toggleSeconds();
        }, 700);
      }

      function endHold() {
        if (holdTimer) {
          clearTimeout(holdTimer);
          holdTimer = null;
        }
      }

      function handleTap(event) {
        var target = event.target || event.srcElement;

        if (event) {
          event.preventDefault();
        }

        if (holdTriggered) {
          holdTriggered = false;
          return;
        }

        if (target === settingsButton) {
          toggleSettingsPanel();
          return;
        }

        if (isInsideSettings(target)) {
          return;
        }

        if (body.className.indexOf("settings-open") !== -1) {
          toggleSettingsPanel(false);
          return;
        }

        cycleTheme();
      }

      /* Manual parent walk for iOS 9 compatibility. */
      function isInsideSettings(node) {
        while (node) {
          if (node === settingsPanel) {
            return true;
          }
          node = node.parentNode;
        }
        return false;
      }

      /* Initial render and event wiring. */
      normalizeSettings();
      applyTheme();
      applySeconds();
      applyStyle();
      applyWeight();
      applyLanguage();
      refreshSettingsUI();
      updateShift();
      updateClock();
      setInterval(updateClock, 250);
      setInterval(updateShift, 180000);

      settingsPanel.onclick = handleSettingsClick;
      settingsPanel.ontouchstart = function (event) {
        if (event && event.stopPropagation) {
          event.stopPropagation();
        }
      };
      document.addEventListener("touchstart", startHold, false);
      document.addEventListener("touchend", endHold, false);
      document.addEventListener("touchcancel", endHold, false);
      document.addEventListener("click", handleTap, false);

      /*
        Application Cache update hook.
        When clock.appcache changes, iOS Safari downloads the new cache. This
        handler swaps it in and reloads so the user sees the latest page.
      */
      if (window.applicationCache) {
        window.applicationCache.addEventListener("updateready", function () {
          try {
            window.applicationCache.swapCache();
            window.location.reload();
          } catch (error) {}
        }, false);
      }
    })();
  </script>
</body>
</html>
