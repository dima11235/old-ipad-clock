<!DOCTYPE html>
<html manifest="clock.appcache">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="format-detection" content="telephone=no">
  <title>iPad Clock</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070707;
      color: #ffc44d;
      font-family: Arial, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      display: table;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      display: table-cell;
      vertical-align: middle;
      padding: 4vh 4vw;
    }

    #clock {
      display: inline-block;
      padding: 4vh 3vw;
      border-radius: 28px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.06), transparent 38%),
        linear-gradient(180deg, #151515, #080808 55%, #040404);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.04),
        inset 0 -2px 18px rgba(0, 0, 0, 0.65),
        0 18px 60px rgba(0, 0, 0, 0.45);
      -webkit-transform: translate(0, 0);
      transform: translate(0, 0);
    }

    body.style-flat #clock {
      padding: 1vh 0;
      border-radius: 0;
      background: none;
      box-shadow: none;
    }

    #time {
      white-space: nowrap;
      font-size: 0;
    }

    .digit {
      position: relative;
      display: inline-block;
      width: 19.2vw;
      height: 32.4vw;
      margin: 0 0.96vw;
      vertical-align: middle;
    }

    .digit .seg {
      position: absolute;
      background: rgba(90, 48, 0, 0.22);
      border-radius: 999px;
      box-shadow: none;
    }

    .digit .seg.on {
      background: currentColor;
      box-shadow:
        0 0 10px rgba(255, 196, 77, 0.55),
        0 0 24px rgba(255, 140, 0, 0.32);
    }

    body.style-flat .digit .seg.on {
      background: currentColor;
      box-shadow:
        0 0 10px rgba(255, 196, 77, 0.55),
        0 0 24px rgba(255, 140, 0, 0.32);
      border-radius: 2px;
    }

    body.style-flat .digit .seg {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
    }

    body.style-flat #colon:before,
    body.style-flat #colon:after {
      background: currentColor;
      box-shadow:
        0 0 8px rgba(255, 196, 77, 0.45),
        0 0 18px rgba(255, 140, 0, 0.28);
      border-radius: 2px;
    }

    body.style-flat .digit {
      margin: 0 0.45vw;
    }

    body.style-flat #colon {
      margin: 0 0.45vw;
    }

    body.style-flat #clock:before {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      margin-bottom: 2.2vh;
      background: rgba(255, 255, 255, 0.08);
    }

    body.style-flat #clock:after {
      content: "";
      display: block;
      width: 100%;
      height: 1px;
      margin-top: 2.2vh;
      background: rgba(255, 255, 255, 0.08);
    }

    .seg-a,
    .seg-d,
    .seg-g {
      left: 18%;
      width: 64%;
      height: 7%;
    }

    .seg-a {
      top: 4%;
    }

    .seg-g {
      top: 46.5%;
    }

    .seg-d {
      bottom: 4%;
    }

    .seg-b,
    .seg-c,
    .seg-e,
    .seg-f {
      width: 7%;
      height: 34%;
    }

    .seg-b,
    .seg-c {
      right: 9%;
    }

    .seg-e,
    .seg-f {
      left: 9%;
    }

    .seg-f,
    .seg-b {
      top: 8%;
    }

    .seg-e,
    .seg-c {
      bottom: 8%;
    }

    #colon {
      position: relative;
      display: inline-block;
      width: 6vw;
      height: 32.4vw;
      margin: 0 1.2vw;
      vertical-align: middle;
    }

    #colon:before,
    #colon:after {
      content: "";
      position: absolute;
      left: 50%;
      width: 1.92vw;
      height: 1.92vw;
      margin-left: -0.96vw;
      border-radius: 50%;
      background: currentColor;
      box-shadow:
        0 0 8px rgba(255, 196, 77, 0.45),
        0 0 18px rgba(255, 140, 0, 0.28);
    }

    #colon:before {
      top: 32%;
    }

    #colon:after {
      bottom: 32%;
    }

    #colon.blink:before,
    #colon.blink:after {
      opacity: 0.28;
      box-shadow: none;
    }

    .seconds {
      display: inline-block;
      width: 0;
      overflow: hidden;
      opacity: 0;
      vertical-align: middle;
      -webkit-transition: opacity 0.2s ease;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }

    body.show-seconds .seconds {
      width: auto;
      opacity: 1;
    }

    body.show-seconds .digit {
      width: 11.8vw;
      height: 20vw;
      margin: 0 0.45vw;
    }

    body.show-seconds #colon {
      width: 4vw;
      height: 20vw;
      margin: 0 0.7vw;
    }

    body.show-seconds #colon:before,
    body.show-seconds #colon:after {
      width: 1.25vw;
      height: 1.25vw;
      margin-left: -0.625vw;
    }

    body.show-seconds .seconds .digit {
      width: 7vw;
      height: 11.8vw;
      margin: 0 0.2vw;
    }

    body.show-seconds .seconds .seg-a,
    body.show-seconds .seconds .seg-d,
    body.show-seconds .seconds .seg-g {
      height: 9%;
    }

    body.show-seconds .seconds .seg-b,
    body.show-seconds .seconds .seg-c,
    body.show-seconds .seconds .seg-e,
    body.show-seconds .seconds .seg-f {
      width: 9%;
      height: 31%;
    }

    #status {
      position: fixed;
      left: 50%;
      bottom: 5vh;
      max-width: 84vw;
      padding: 0.7em 1em;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      font-size: 3.6vw;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      background: rgba(0, 0, 0, 0.35);
      -webkit-transform: translate(-50%, 10px);
      transform: translate(-50%, 10px);
      -webkit-transition: opacity 0.25s ease, -webkit-transform 0.25s ease;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }

    #status.visible {
      opacity: 0.9;
      -webkit-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    #settings-button {
      position: fixed;
      top: 2.5vh;
      right: 3vw;
      z-index: 20;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.25);
      color: rgba(255, 255, 255, 0.7);
      font-size: 22px;
      line-height: 42px;
      text-align: center;
      cursor: pointer;
    }

    #settings-panel {
      position: fixed;
      top: 9vh;
      right: 3vw;
      z-index: 21;
      width: 74vw;
      max-width: 420px;
      padding: 18px 18px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      background: rgba(10, 10, 10, 0.94);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      text-align: left;
      opacity: 0;
      visibility: hidden;
      -webkit-transform: translate(0, -10px);
      transform: translate(0, -10px);
      -webkit-transition: opacity 0.2s ease, -webkit-transform 0.2s ease;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    body.settings-open #settings-panel {
      opacity: 1;
      visibility: visible;
      -webkit-transform: translate(0, 0);
      transform: translate(0, 0);
    }

    .settings-title {
      margin: 0 0 12px;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.76);
    }

    .settings-row {
      margin-bottom: 12px;
    }

    .settings-label {
      margin-bottom: 7px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.56);
    }

    .settings-options {
      font-size: 0;
    }

    .option-button {
      display: inline-block;
      margin: 0 8px 8px 0;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.84);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .option-button.active {
      border-color: currentColor;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .settings-hint {
      margin-top: 2px;
      font-size: 11px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.42);
    }

    body.theme-amber {
      background: #070707;
      color: #ffc44d;
    }

    body.theme-red {
      background: #060606;
      color: #ff695d;
    }

    body.theme-green {
      background: #060807;
      color: #83ff9a;
    }

    body.theme-ice {
      background: #050709;
      color: #98efff;
    }

    body.style-flat.theme-amber {
      background: #101010;
      color: #ffd166;
    }

    body.style-flat.theme-red {
      background: #120d0d;
      color: #ff7b72;
    }

    body.style-flat.theme-green {
      background: #0c100d;
      color: #8df5a6;
    }

    body.style-flat.theme-ice {
      background: #0c1013;
      color: #9ad7ff;
    }

    body.dim #clock {
      opacity: 0.56;
    }

    @media (orientation: portrait) {
      .digit {
        width: 20.4vw;
        height: 36vw;
        margin: 0 0.84vw;
      }

      #colon {
        width: 6.48vw;
        height: 36vw;
      }

      #colon:before,
      #colon:after {
        width: 2.16vw;
        height: 2.16vw;
        margin-left: -1.08vw;
      }

      body.show-seconds .seconds .digit {
        width: 7.4vw;
        height: 12.8vw;
      }

      body.show-seconds .digit {
        width: 12.6vw;
        height: 22vw;
      }

      body.show-seconds #colon {
        width: 4.4vw;
        height: 22vw;
      }

      body.show-seconds #colon:before,
      body.show-seconds #colon:after {
        width: 1.4vw;
        height: 1.4vw;
        margin-left: -0.7vw;
      }

      #status {
        font-size: 4.4vw;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="clock">
      <div id="time">
        <div class="digit" id="hours-tens">
          <span class="seg seg-a"></span><span class="seg seg-b"></span><span class="seg seg-c"></span><span class="seg seg-d"></span><span class="seg seg-e"></span><span class="seg seg-f"></span><span class="seg seg-g"></span>
        </div>
        <div class="digit" id="hours-ones">
          <span class="seg seg-a"></span><span class="seg seg-b"></span><span class="seg seg-c"></span><span class="seg seg-d"></span><span class="seg seg-e"></span><span class="seg seg-f"></span><span class="seg seg-g"></span>
        </div>
        <div id="colon"></div>
        <div class="digit" id="minutes-tens">
          <span class="seg seg-a"></span><span class="seg seg-b"></span><span class="seg seg-c"></span><span class="seg seg-d"></span><span class="seg seg-e"></span><span class="seg seg-f"></span><span class="seg seg-g"></span>
        </div>
        <div class="digit" id="minutes-ones">
          <span class="seg seg-a"></span><span class="seg seg-b"></span><span class="seg seg-c"></span><span class="seg seg-d"></span><span class="seg seg-e"></span><span class="seg seg-f"></span><span class="seg seg-g"></span>
        </div>
        <div class="seconds" id="seconds-wrap">
          <div class="digit" id="seconds-tens">
            <span class="seg seg-a"></span><span class="seg seg-b"></span><span class="seg seg-c"></span><span class="seg seg-d"></span><span class="seg seg-e"></span><span class="seg seg-f"></span><span class="seg seg-g"></span>
          </div>
          <div class="digit" id="seconds-ones">
            <span class="seg seg-a"></span><span class="seg seg-b"></span><span class="seg seg-c"></span><span class="seg seg-d"></span><span class="seg seg-e"></span><span class="seg seg-f"></span><span class="seg seg-g"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="settings-button">+</div>
  <div id="settings-panel">
    <div class="settings-title">Clock Settings</div>
    <div class="settings-row">
      <div class="settings-label">Style</div>
      <div class="settings-options" id="style-options">
        <span class="option-button" data-style="retro">Retro</span>
        <span class="option-button" data-style="flat">Flat</span>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label">Theme</div>
      <div class="settings-options" id="theme-options">
        <span class="option-button" data-theme="amber">Amber</span>
        <span class="option-button" data-theme="red">Red</span>
        <span class="option-button" data-theme="green">Green</span>
        <span class="option-button" data-theme="ice">Ice</span>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label">Seconds</div>
      <div class="settings-options" id="seconds-options">
        <span class="option-button" data-seconds="off">Off</span>
        <span class="option-button" data-seconds="on">On</span>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label">Colon Blink</div>
      <div class="settings-options" id="blink-options">
        <span class="option-button" data-blink="on">On</span>
        <span class="option-button" data-blink="off">Off</span>
      </div>
    </div>
    <div class="settings-row">
      <div class="settings-label">Night Dim</div>
      <div class="settings-options" id="dim-options">
        <span class="option-button" data-dim="auto">Auto</span>
        <span class="option-button" data-dim="off">Off</span>
      </div>
    </div>
    <div class="settings-hint">Tap plus to open settings. Tap screen outside the panel to switch themes quickly. Hold on the clock to toggle seconds.</div>
  </div>
  <div id="status"></div>

  <script>
    (function () {
      var digitMap = {
        "0": ["a", "b", "c", "d", "e", "f"],
        "1": ["b", "c"],
        "2": ["a", "b", "d", "e", "g"],
        "3": ["a", "b", "c", "d", "g"],
        "4": ["b", "c", "f", "g"],
        "5": ["a", "c", "d", "f", "g"],
        "6": ["a", "c", "d", "e", "f", "g"],
        "7": ["a", "b", "c"],
        "8": ["a", "b", "c", "d", "e", "f", "g"],
        "9": ["a", "b", "c", "d", "f", "g"]
      };

      var body = document.body;
      var clockNode = document.getElementById("clock");
      var colonNode = document.getElementById("colon");
      var statusNode = document.getElementById("status");
      var settingsButton = document.getElementById("settings-button");
      var settingsPanel = document.getElementById("settings-panel");
      var digits = {
        ht: document.getElementById("hours-tens"),
        ho: document.getElementById("hours-ones"),
        mt: document.getElementById("minutes-tens"),
        mo: document.getElementById("minutes-ones"),
        st: document.getElementById("seconds-tens"),
        so: document.getElementById("seconds-ones")
      };

      var themes = ["amber", "red", "green", "ice"];
      var styles = ["retro", "flat"];
      var settings = loadSettings();
      var holdTimer = null;
      var holdTriggered = false;
      var statusTimer = null;
      var shiftIndex = 0;
      var shiftPositions = [
        { x: 0, y: 0 },
        { x: 1, y: 0 },
        { x: 1, y: 1 },
        { x: 0, y: 1 },
        { x: -1, y: 1 },
        { x: -1, y: 0 },
        { x: -1, y: -1 },
        { x: 0, y: -1 },
        { x: 1, y: -1 }
      ];

      function pad(value) {
        return value < 10 ? "0" + value : String(value);
      }

      function loadSettings() {
        var raw;

        try {
          raw = window.localStorage ? window.localStorage.getItem("clockSettings") : null;
        } catch (error) {
          raw = null;
        }

        if (!raw) {
          return {
            theme: "amber",
            showSeconds: false,
            style: "retro",
            blink: true,
            autoDim: true
          };
        }

        try {
          return JSON.parse(raw);
        } catch (error) {
          return {
            theme: "amber",
            showSeconds: false,
            style: "retro",
            blink: true,
            autoDim: true
          };
        }
      }

      function normalizeSettings() {
        if (!hasValue(themes, settings.theme)) {
          settings.theme = "amber";
        }

        if (!hasValue(styles, settings.style)) {
          settings.style = "retro";
        }

        settings.showSeconds = !!settings.showSeconds;
        settings.blink = settings.blink !== false;
        settings.autoDim = settings.autoDim !== false;
      }

      function hasValue(list, value) {
        var i;

        for (i = 0; i < list.length; i++) {
          if (list[i] === value) {
            return true;
          }
        }

        return false;
      }

      function saveSettings() {
        try {
          if (window.localStorage) {
            window.localStorage.setItem("clockSettings", JSON.stringify(settings));
          }
        } catch (error) {}
      }

      function setClassFlag(className, enabled) {
        if (enabled) {
          if (body.className.indexOf(className) === -1) {
            body.className += (body.className ? " " : "") + className;
          }
        } else {
          body.className = body.className.replace(new RegExp("(^|\\s)" + className + "(\\s|$)", "g"), " ").replace(/\s+/g, " ").replace(/^\s+|\s+$/g, "");
        }
      }

      function applyTheme() {
        var i;

        for (i = 0; i < themes.length; i++) {
          body.className = body.className.replace(new RegExp("(^|\\s)theme-" + themes[i] + "(\\s|$)", "g"), " ");
        }

        body.className = body.className.replace(/\s+/g, " ").replace(/^\s+|\s+$/g, "");
        body.className += (body.className ? " " : "") + "theme-" + settings.theme;
      }

      function applySeconds() {
        setClassFlag("show-seconds", settings.showSeconds);
      }

      function applyStyle() {
        setClassFlag("style-flat", settings.style === "flat");
      }

      function applyDim(now) {
        var hour = now.getHours();
        setClassFlag("dim", settings.autoDim && (hour >= 22 || hour < 7));
      }

      function showStatus(text) {
        statusNode.innerHTML = text;
        statusNode.className = "visible";

        if (statusTimer) {
          clearTimeout(statusTimer);
        }

        statusTimer = setTimeout(function () {
          statusNode.className = "";
        }, 1400);
      }

      function cycleTheme() {
        var index = 0;
        var i;

        for (i = 0; i < themes.length; i++) {
          if (themes[i] === settings.theme) {
            index = i;
            break;
          }
        }

        settings.theme = themes[(index + 1) % themes.length];
        applyTheme();
        saveSettings();
        showStatus(settings.theme + " theme");
        refreshSettingsUI();
      }

      function toggleSeconds() {
        settings.showSeconds = !settings.showSeconds;
        applySeconds();
        saveSettings();
        showStatus(settings.showSeconds ? "seconds on" : "seconds off");
        refreshSettingsUI();
      }

      function setSetting(name, value) {
        settings[name] = value;
        applyTheme();
        applySeconds();
        applyStyle();
        saveSettings();
        refreshSettingsUI();
      }

      function setOptionActive(containerId, attr, value) {
        var container = document.getElementById(containerId);
        var buttons = container.getElementsByTagName("span");
        var i;

        for (i = 0; i < buttons.length; i++) {
          if (buttons[i].getAttribute(attr) === value) {
            buttons[i].className = "option-button active";
          } else {
            buttons[i].className = "option-button";
          }
        }
      }

      function refreshSettingsUI() {
        setOptionActive("style-options", "data-style", settings.style);
        setOptionActive("theme-options", "data-theme", settings.theme);
        setOptionActive("seconds-options", "data-seconds", settings.showSeconds ? "on" : "off");
        setOptionActive("blink-options", "data-blink", settings.blink ? "on" : "off");
        setOptionActive("dim-options", "data-dim", settings.autoDim ? "auto" : "off");
      }

      function toggleSettingsPanel(forceOpen) {
        var open = typeof forceOpen === "boolean" ? forceOpen : body.className.indexOf("settings-open") === -1;
        setClassFlag("settings-open", open);
      }

      function handleSettingsClick(event) {
        var target = event.target || event.srcElement;
        var style = target.getAttribute("data-style");
        var theme = target.getAttribute("data-theme");
        var seconds = target.getAttribute("data-seconds");
        var blink = target.getAttribute("data-blink");
        var dim = target.getAttribute("data-dim");

        if (!style && !theme && !seconds && !blink && !dim) {
          return;
        }

        event.preventDefault();
        event.cancelBubble = true;
        if (event.stopPropagation) {
          event.stopPropagation();
        }

        if (style) {
          setSetting("style", style);
          showStatus(style + " style");
        } else if (theme) {
          setSetting("theme", theme);
          showStatus(theme + " theme");
        } else if (seconds) {
          setSetting("showSeconds", seconds === "on");
          showStatus(seconds === "on" ? "seconds on" : "seconds off");
        } else if (blink) {
          setSetting("blink", blink === "on");
          showStatus(blink === "on" ? "blink on" : "blink off");
        } else if (dim) {
          setSetting("autoDim", dim === "auto");
          showStatus(dim === "auto" ? "night dim auto" : "night dim off");
        }
      }

      function paintDigit(node, value) {
        var segments = node.getElementsByClassName("seg");
        var active = digitMap[value];
        var i;
        var segmentName;
        var match;
        var isOn;

        for (i = 0; i < segments.length; i++) {
          match = segments[i].className.match(/seg-([a-g])/);
          segmentName = match ? match[1] : "";
          isOn = hasValue(active, segmentName);

          if (isOn) {
            segments[i].className = "seg seg-" + segmentName + " on";
          } else {
            segments[i].className = "seg seg-" + segmentName;
          }
        }
      }

      function drawTime(now) {
        var hours = pad(now.getHours());
        var minutes = pad(now.getMinutes());
        var seconds = pad(now.getSeconds());

        paintDigit(digits.ht, hours.charAt(0));
        paintDigit(digits.ho, hours.charAt(1));
        paintDigit(digits.mt, minutes.charAt(0));
        paintDigit(digits.mo, minutes.charAt(1));
        paintDigit(digits.st, seconds.charAt(0));
        paintDigit(digits.so, seconds.charAt(1));
      }

      function updateShift() {
        var position = shiftPositions[shiftIndex];

        clockNode.style.webkitTransform = "translate(" + position.x + "px," + position.y + "px)";
        clockNode.style.transform = "translate(" + position.x + "px," + position.y + "px)";
        shiftIndex = (shiftIndex + 1) % shiftPositions.length;
      }

      function updateClock() {
        var now = new Date();

        drawTime(now);
        applyDim(now);
        if (settings.blink) {
          colonNode.className = now.getSeconds() % 2 === 0 ? "" : "blink";
        } else {
          colonNode.className = "";
        }
      }

      function startHold(event) {
        var target = event.target || event.srcElement;

        if (event && event.touches && event.touches.length > 1) {
          return;
        }

        if (target === settingsButton || isInsideSettings(target)) {
          return;
        }

        holdTriggered = false;
        holdTimer = setTimeout(function () {
          holdTriggered = true;
          toggleSeconds();
        }, 700);
      }

      function endHold() {
        if (holdTimer) {
          clearTimeout(holdTimer);
          holdTimer = null;
        }
      }

      function handleTap(event) {
        var target = event.target || event.srcElement;

        if (event) {
          event.preventDefault();
        }

        if (holdTriggered) {
          holdTriggered = false;
          return;
        }

        if (target === settingsButton) {
          toggleSettingsPanel();
          return;
        }

        if (isInsideSettings(target)) {
          return;
        }

        if (body.className.indexOf("settings-open") !== -1) {
          toggleSettingsPanel(false);
          return;
        }

        cycleTheme();
      }

      function isInsideSettings(node) {
        while (node) {
          if (node === settingsPanel) {
            return true;
          }
          node = node.parentNode;
        }
        return false;
      }

      normalizeSettings();
      applyTheme();
      applySeconds();
      applyStyle();
      refreshSettingsUI();
      updateShift();
      updateClock();
      setInterval(updateClock, 250);
      setInterval(updateShift, 180000);

      settingsPanel.onclick = handleSettingsClick;
      settingsPanel.ontouchstart = function (event) {
        if (event && event.stopPropagation) {
          event.stopPropagation();
        }
      };
      document.addEventListener("touchstart", startHold, false);
      document.addEventListener("touchend", endHold, false);
      document.addEventListener("touchcancel", endHold, false);
      document.addEventListener("click", handleTap, false);

      if (window.applicationCache) {
        window.applicationCache.addEventListener("updateready", function () {
          try {
            window.applicationCache.swapCache();
            window.location.reload();
          } catch (error) {}
        }, false);
      }
    })();
  </script>
</body>
</html>
